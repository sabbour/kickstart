<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kickstart — Deploy to AKS</title>
  <meta name="description" content="AI-guided onboarding for deploying apps to Azure Kubernetes Service">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">

  <!-- Fluent 2 Web Components (CDN, zero-dep) -->
  <script type="module" src="https://unpkg.com/@fluentui/web-components"></script>

  <!-- MSAL.js for Entra ID auth -->
  <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/core.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

  <div class="portal-shell">
    <!-- ==================== Top Bar ==================== -->
    <header class="topbar" role="banner">
      <a class="topbar-brand" href="#/" aria-label="Kickstart — home">
        <img src="assets/logo.svg" alt="" width="24" height="24">
        <span>Kickstart</span>
      </a>

      <div class="topbar-actions">
        <!-- Copilot toggle (top bar) -->
        <button class="topbar-btn" id="topbar-copilot-toggle"
                aria-label="Toggle Copilot panel" title="Copilot">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
            <path d="M10 2a8 8 0 018 8 8 8 0 01-8 8 8 8 0 01-8-8 8 8 0 018-8zm0 1.5a6.5 6.5 0 100 13 6.5 6.5 0 000-13zM10 6a1 1 0 011 1v2h2a1 1 0 110 2h-2v2a1 1 0 11-2 0v-2H7a1 1 0 110-2h2V7a1 1 0 011-1z"/>
          </svg>
        </button>

        <!-- Notifications (placeholder) -->
        <button class="topbar-btn" aria-label="Notifications" title="Notifications">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
            <path d="M10 2a5.5 5.5 0 015.5 5.5v3l1.5 2v1H3v-1l1.5-2v-3A5.5 5.5 0 0110 2zm-1.5 14h3a1.5 1.5 0 01-3 0z"/>
          </svg>
        </button>

        <!-- User / sign-in -->
        <button class="topbar-user" id="topbar-user" aria-label="Sign in">
          <span class="topbar-avatar">?</span>
          <span>Sign in</span>
        </button>
      </div>
    </header>

    <!-- ==================== Navigation Pane ==================== -->
    <nav class="nav-pane" id="nav-pane" role="navigation" aria-label="Main navigation">
      <!-- Populated by Navigation.init() in app.js -->
    </nav>

    <!-- ==================== Main Content ==================== -->
    <main class="main-content" role="main">
      <!-- Command bar -->
      <div id="command-bar-slot"></div>

      <!-- Breadcrumbs -->
      <div class="breadcrumb-bar" id="breadcrumb-bar" aria-label="Breadcrumb">
        <span class="breadcrumb-current">Kickstart</span>
      </div>

      <!-- Scrollable content area -->
      <div class="content-scroll" id="content-area" aria-live="polite">
        <!-- Route content rendered here by the SPA router -->
        <div style="display:flex;align-items:center;justify-content:center;height:200px">
          <div class="spinner large" aria-label="Loading"></div>
        </div>
      </div>
    </main>

    <!-- ==================== Copilot Panel (right side) ==================== -->
    <div id="copilot-slot">
      <!-- Populated by createCopilotPanel() in app.js -->
    </div>
  </div>

  <!-- App entry point (ES modules) -->
  <script type="module" src="js/app.js"></script>

  <!-- Copilot toggle from top bar -->
  <script type="module">
    import { EventBus } from './js/framework/core.js';

    document.getElementById('topbar-copilot-toggle')?.addEventListener('click', () => {
      EventBus.emit('copilot:toggleRequest');
    });

    EventBus.on('copilot:toggleRequest', () => {
      const panel = document.getElementById('copilot-panel');
      if (panel) panel.classList.toggle('hidden');
    });
  </script>
</body>
</html>
