<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kickstart — Deploy to AKS</title>
  <meta name="description" content="AI-guided onboarding for deploying apps to Azure Kubernetes Service">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">

  <!-- Fluent 2 Web Components (CDN, zero-dep) -->
  <script type="module" src="https://unpkg.com/@fluentui/web-components"></script>

  <!-- MSAL.js for Entra ID auth -->
  <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/core.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

  <div class="app-shell">
    <!-- ==================== Header ==================== -->
    <header class="topbar" role="banner">
      <a class="topbar-brand" href="#/" aria-label="Kickstart — home">
        <img src="assets/logo.svg" alt="" width="24" height="24">
        <span>Kickstart</span>
      </a>

      <div class="topbar-actions">
        <!-- Sessions toggle -->
        <button class="topbar-btn" id="topbar-sessions-toggle"
                aria-label="Toggle sessions" title="Sessions">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
            <path d="M3 4h14v1.5H3V4zm0 4h14v1.5H3V8zm0 4h10v1.5H3V12z"/>
          </svg>
        </button>

        <!-- Prompt inspector toggle -->
        <button class="topbar-btn" id="topbar-inspector-toggle"
                aria-label="Toggle prompt inspector" title="Prompt Inspector">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
            <path d="M8 1a7 7 0 110 14A7 7 0 018 1zm0 1.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM8 4a.75.75 0 01.75.75v2.5h2.5a.75.75 0 010 1.5h-2.5v2.5a.75.75 0 01-1.5 0v-2.5h-2.5a.75.75 0 010-1.5h2.5v-2.5A.75.75 0 018 4z"/>
          </svg>
        </button>

        <!-- User / sign-in -->
        <button class="topbar-user" id="topbar-user" aria-label="Sign in">
          <span class="topbar-avatar">?</span>
          <span>Sign in</span>
        </button>
      </div>
    </header>

    <!-- ==================== Main Layout ==================== -->
    <div class="app-layout">
      <!-- Sessions sidebar (optional, toggleable) -->
      <aside class="sessions-sidebar hidden" id="sessions-sidebar" aria-label="Sessions">
        <div class="sessions-header">
          <span>Sessions</span>
          <button class="sessions-new-btn" aria-label="New session" title="New session">＋</button>
        </div>
        <div class="sessions-list" id="sessions-list">
          <div class="session-item active">New conversation</div>
        </div>
      </aside>

      <!-- Chat area (primary) -->
      <main class="chat-main" id="chat-main" role="main">
        <!-- Populated by createChatUI() in app.js -->
      </main>

      <!-- File viewer sidebar (appears when files are generated) -->
      <aside class="file-viewer hidden" id="file-viewer" aria-label="Generated files">
        <!-- Populated by createFileViewer() in app.js -->
      </aside>
    </div>
  </div>

  <!-- App entry point (ES modules) -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
