<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kickstart on Azure Kubernetes Service (AKS)</title>
  <meta name="description" content="AI-guided onboarding for deploying apps to Azure Kubernetes Service">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">

  <!-- Fluent 2 Web Components (CDN, zero-dep) -->
  <script type="module" src="https://unpkg.com/@fluentui/web-components"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/core.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/landing.css">
</head>
<body class="on-landing">
<div id="root"></div>

  <!-- React app renders the full UI into #root -->

  <!-- Build metadata — replaced by CI pipeline at deploy time -->
  <script>
    window.__BUILD_SHA__ = 'dev';
    window.__BUILD_DATE__ = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  </script>

  <!-- App entry point (ES modules) -->
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
