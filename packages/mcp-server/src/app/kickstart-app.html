<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kickstart — AKS Onboarding</title>
<style>
/* ── Fluent 2 Design Tokens ─────────────────────────────────────── */
:root {
  --color-brand-primary: #0078d4;
  --color-brand-primary-hover: #106ebe;
  --color-brand-primary-active: #005a9e;
  --color-brand-light: #deecf9;
  --color-brand-lighter: #eff6fc;
  --color-brand-foreground-1: #0078d4;
  --color-brand-background-2: #deecf9;
  --color-brand-stroke-1: #0078d4;

  --color-neutral-background-1: #ffffff;
  --color-neutral-background-1-hover: #f5f5f5;
  --color-neutral-background-2: #faf9f8;
  --color-neutral-background-3: #f3f2f1;
  --color-neutral-background-4: #edebe9;
  --color-neutral-background-inverted: #1b1a19;
  --color-neutral-foreground-1: #242424;
  --color-neutral-foreground-2: #424242;
  --color-neutral-foreground-3: #616161;
  --color-neutral-foreground-disabled: #a19f9d;
  --color-neutral-foreground-on-brand: #ffffff;
  --color-neutral-stroke-1: #d1d1d1;
  --color-neutral-stroke-2: #e1dfdd;

  --color-success: #107c10;
  --color-success-background: #dff6dd;
  --color-warning: #ffb900;
  --color-warning-background: #fff4ce;
  --color-error: #d13438;
  --color-error-background: #fde7e9;

  --color-copilot-gradient-start: #7b2ff2;
  --color-copilot-gradient-end: #0078d4;
  --color-copilot-bg: #f7f7ff;

  --font-family-base: "Segoe UI Variable", "Segoe UI", system-ui, -apple-system, sans-serif;
  --font-family-mono: "Cascadia Code", "Fira Code", Consolas, "Courier New", monospace;

  --font-size-100: 10px;
  --font-size-200: 12px;
  --font-size-300: 14px;
  --font-size-400: 16px;
  --font-size-500: 20px;
  --font-size-600: 24px;

  --font-weight-regular: 400;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;

  --spacing-xxs: 2px;
  --spacing-xs: 4px;
  --spacing-s: 8px;
  --spacing-m: 12px;
  --spacing-l: 16px;
  --spacing-xl: 24px;
  --spacing-xxl: 32px;
  --spacing-xxxl: 48px;

  --radius-none: 0;
  --radius-small: 2px;
  --radius-medium: 4px;
  --radius-large: 8px;
  --radius-xlarge: 12px;
  --radius-circular: 9999px;

  --shadow-2: 0 1px 2px rgba(0,0,0,0.12);
  --shadow-4: 0 2px 4px rgba(0,0,0,0.14);
  --shadow-8: 0 4px 8px rgba(0,0,0,0.14);

  --duration-fast: 100ms;
  --duration-normal: 200ms;
  --duration-slow: 300ms;
}

/* ── Reset & base ───────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: var(--font-family-base);
  font-size: var(--font-size-300);
  color: var(--color-neutral-foreground-1);
  background: var(--color-neutral-background-1);
  overflow: hidden;
}

/* ── App layout ─────────────────────────────────────────────────── */
#app {
  display: flex;
  flex-direction: column;
  height: 100%;
}

/* ── Header ─────────────────────────────────────────────────────── */
.app-header {
  display: flex;
  align-items: center;
  gap: var(--spacing-s);
  padding: var(--spacing-s) var(--spacing-l);
  background: linear-gradient(135deg, var(--color-copilot-gradient-start), var(--color-copilot-gradient-end));
  color: #fff;
  flex-shrink: 0;
}
.app-header-icon { font-size: 18px; }
.app-header-title { font-size: var(--font-size-300); font-weight: var(--font-weight-semibold); }

/* ── Phase indicator ────────────────────────────────────────────── */
.phase-bar {
  display: flex;
  align-items: center;
  gap: var(--spacing-xs);
  padding: var(--spacing-s) var(--spacing-l);
  background: var(--color-neutral-background-2);
  border-bottom: 1px solid var(--color-neutral-stroke-2);
  flex-shrink: 0;
  overflow-x: auto;
  white-space: nowrap;
}
.phase-step {
  display: inline-flex;
  align-items: center;
  gap: var(--spacing-xs);
  font-size: var(--font-size-200);
  color: var(--color-neutral-foreground-3);
}
.phase-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--color-neutral-stroke-1);
  flex-shrink: 0;
}
.phase-dot.active {
  background: var(--color-brand-primary);
  box-shadow: 0 0 0 2px var(--color-brand-light);
}
.phase-dot.completed { background: var(--color-success); }
.phase-connector {
  width: 16px; height: 1px;
  background: var(--color-neutral-stroke-2);
  flex-shrink: 0;
}
.phase-connector.completed { background: var(--color-success); }

/* ── Messages area ──────────────────────────────────────────────── */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: var(--spacing-l);
  display: flex;
  flex-direction: column;
  gap: var(--spacing-m);
}

.chat-bubble {
  max-width: 92%;
  padding: var(--spacing-s) var(--spacing-m);
  border-radius: var(--radius-large);
  font-size: var(--font-size-300);
  line-height: 1.5;
  word-wrap: break-word;
  overflow-wrap: break-word;
}
.chat-bubble.user {
  align-self: flex-end;
  background: var(--color-brand-primary);
  color: var(--color-neutral-foreground-on-brand);
  border-bottom-right-radius: var(--radius-small);
}
.chat-bubble.assistant {
  align-self: flex-start;
  background: var(--color-neutral-background-3);
  border-bottom-left-radius: var(--radius-small);
}
.chat-bubble.error {
  background: var(--color-error-background);
  color: var(--color-error);
}

/* ── Typing indicator ───────────────────────────────────────────── */
.typing-indicator {
  display: flex;
  gap: 4px;
  align-self: flex-start;
  padding: var(--spacing-s) var(--spacing-m);
}
.typing-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--color-neutral-foreground-3);
  animation: typingBounce 1.2s infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-4px); }
}

/* ── Input area ─────────────────────────────────────────────────── */
.input-area {
  display: flex;
  gap: var(--spacing-s);
  padding: var(--spacing-s) var(--spacing-l);
  border-top: 1px solid var(--color-neutral-stroke-2);
  background: var(--color-neutral-background-1);
  flex-shrink: 0;
}
.input-area textarea {
  flex: 1;
  resize: none;
  border: 1px solid var(--color-neutral-stroke-1);
  border-radius: var(--radius-medium);
  padding: var(--spacing-s) var(--spacing-m);
  font-family: var(--font-family-base);
  font-size: var(--font-size-300);
  background: var(--color-neutral-background-1);
  color: var(--color-neutral-foreground-1);
  outline: none;
  min-height: 36px;
  max-height: 120px;
}
.input-area textarea:focus {
  border-color: var(--color-brand-primary);
  box-shadow: 0 0 0 1px var(--color-brand-primary);
}
.send-btn {
  width: 36px; height: 36px;
  border: none;
  border-radius: var(--radius-medium);
  background: var(--color-brand-primary);
  color: var(--color-neutral-foreground-on-brand);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background var(--duration-fast);
}
.send-btn:hover { background: var(--color-brand-primary-hover); }
.send-btn:active { background: var(--color-brand-primary-active); }
.send-btn:disabled {
  background: var(--color-neutral-background-4);
  color: var(--color-neutral-foreground-disabled);
  cursor: not-allowed;
}

/* ── A2UI Components ────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: var(--spacing-xs);
  padding: var(--spacing-xs) var(--spacing-m);
  border: 1px solid var(--color-neutral-stroke-1);
  border-radius: var(--radius-medium);
  background: var(--color-neutral-background-1);
  color: var(--color-neutral-foreground-1);
  font-family: var(--font-family-base);
  font-size: var(--font-size-300);
  cursor: pointer;
  text-decoration: none;
  transition: background var(--duration-fast);
}
.btn:hover { background: var(--color-neutral-background-3); }
.btn.primary {
  background: var(--color-brand-primary);
  color: var(--color-neutral-foreground-on-brand);
  border-color: var(--color-brand-primary);
}
.btn.primary:hover { background: var(--color-brand-primary-hover); }

.card {
  border: 1px solid var(--color-neutral-stroke-2);
  border-radius: var(--radius-large);
  background: var(--color-neutral-background-1);
  overflow: hidden;
}
.card-header {
  padding: var(--spacing-m) var(--spacing-l);
  border-bottom: 1px solid var(--color-neutral-stroke-2);
}
.card-title {
  font-size: var(--font-size-300);
  font-weight: var(--font-weight-semibold);
  margin: 0;
}
.card-subtitle {
  font-size: var(--font-size-200);
  color: var(--color-neutral-foreground-3);
  margin: var(--spacing-xxs) 0 0;
}
.card-body { padding: var(--spacing-m) var(--spacing-l); }
.card-footer { padding: var(--spacing-m) var(--spacing-l); border-top: 1px solid var(--color-neutral-stroke-2); }

.form-group { margin-bottom: var(--spacing-m); }
.form-label {
  display: block;
  font-size: var(--font-size-200);
  font-weight: var(--font-weight-semibold);
  margin-bottom: var(--spacing-xs);
  color: var(--color-neutral-foreground-2);
}
.form-label .required { color: var(--color-error); }
.form-input {
  width: 100%;
  padding: var(--spacing-xs) var(--spacing-s);
  border: 1px solid var(--color-neutral-stroke-1);
  border-radius: var(--radius-medium);
  font-family: var(--font-family-base);
  font-size: var(--font-size-300);
  background: var(--color-neutral-background-1);
  color: var(--color-neutral-foreground-1);
}
.form-input:focus { border-color: var(--color-brand-primary); outline: none; box-shadow: 0 0 0 1px var(--color-brand-primary); }
.form-hint { display: block; font-size: var(--font-size-100); color: var(--color-neutral-foreground-3); margin-top: var(--spacing-xxs); }

.code-block {
  border: 1px solid var(--color-neutral-stroke-2);
  border-radius: var(--radius-medium);
  overflow: hidden;
  font-family: var(--font-family-mono);
  font-size: var(--font-size-200);
}
.code-block-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: var(--spacing-xs) var(--spacing-s);
  background: var(--color-neutral-background-3);
  font-size: var(--font-size-100);
  color: var(--color-neutral-foreground-3);
}
.code-block-copy {
  border: none;
  background: none;
  color: var(--color-brand-foreground-1);
  cursor: pointer;
  font-size: var(--font-size-100);
  display: flex;
  align-items: center;
  gap: var(--spacing-xxs);
}
.code-block pre {
  margin: 0;
  padding: var(--spacing-s);
  overflow-x: auto;
  background: var(--color-neutral-background-2);
  color: var(--color-neutral-foreground-1);
}
.code-block code { font-family: inherit; }

.status-badge {
  display: inline-flex;
  align-items: center;
  gap: var(--spacing-xs);
  padding: 2px var(--spacing-s);
  border-radius: var(--radius-circular);
  font-size: var(--font-size-100);
  font-weight: var(--font-weight-semibold);
}
.status-badge-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
}
.status-badge.success { background: var(--color-success-background); color: var(--color-success); }
.status-badge.success .status-badge-dot { background: var(--color-success); }
.status-badge.error { background: var(--color-error-background); color: var(--color-error); }
.status-badge.error .status-badge-dot { background: var(--color-error); }
.status-badge.warning { background: var(--color-warning-background); color: var(--color-warning); }
.status-badge.warning .status-badge-dot { background: var(--color-warning); }

.tabs { display: flex; border-bottom: 1px solid var(--color-neutral-stroke-2); }
.tab-item {
  padding: var(--spacing-s) var(--spacing-l);
  border: none;
  background: none;
  font-family: var(--font-family-base);
  font-size: var(--font-size-300);
  color: var(--color-neutral-foreground-3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
}
.tab-item.active { color: var(--color-brand-primary); border-bottom-color: var(--color-brand-primary); }
.tab-content { padding: var(--spacing-m) 0; }

.spinner {
  width: 16px; height: 16px;
  border: 2px solid var(--color-neutral-stroke-2);
  border-top-color: var(--color-brand-primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <header class="app-header">
    <span class="app-header-icon" aria-hidden="true">✦</span>
    <span class="app-header-title">Kickstart</span>
  </header>

  <!-- Phase bar -->
  <nav class="phase-bar" id="phase-bar" aria-label="Conversation progress"></nav>

  <!-- Messages -->
  <div class="messages" id="messages" role="log" aria-live="polite" aria-label="Chat messages"></div>

  <!-- Input -->
  <div class="input-area">
    <textarea id="input" placeholder="Describe your app…" rows="1" aria-label="Message input"></textarea>
    <button class="send-btn" id="send-btn" aria-label="Send message" title="Send">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
        <path d="M1.5 1.3l13 6.7-13 6.7 1.2-5.7H8v-2H2.7z"/>
      </svg>
    </button>
  </div>
</div>

<script>
/* ==========================================================================
   Kickstart MCP App — IDE Surface
   Self-contained: A2UI renderer, chat logic, postMessage protocol
   ========================================================================== */

(function () {
  "use strict";

  // ── State ──────────────────────────────────────────────────────────
  let sessionId = null;
  let isWaiting = false;

  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("input");
  const sendBtn = document.getElementById("send-btn");
  const phaseBarEl = document.getElementById("phase-bar");
  var trustedParentOrigin = resolveTrustedParentOrigin();

  function tryResolveOrigin(value) {
    if (!value || typeof value !== "string") return "";
    try {
      var origin = new URL(value, window.location.href).origin;
      return origin && origin !== "null" ? origin : "";
    } catch (e) {
      return "";
    }
  }

  function resolveTrustedParentOrigin() {
    if (!window.parent || window.parent === window) return "";

    var params = new URLSearchParams(window.location.search);
    var queryOrigin = tryResolveOrigin(params.get("parentOrigin"));
    if (queryOrigin) return queryOrigin;

    var ancestors = window.location.ancestorOrigins;
    if (ancestors && ancestors.length > 0) {
      var ancestorOrigin = tryResolveOrigin(ancestors[0]);
      if (ancestorOrigin) return ancestorOrigin;
    }

    var referrerOrigin = tryResolveOrigin(document.referrer);
    if (referrerOrigin) return referrerOrigin;

    return tryResolveOrigin(window.location.href);
  }

  // ── PostMessage protocol ───────────────────────────────────────────

  /**
   * Send a message to the MCP server via postMessage to parent.
   * MCP App iframe spec: messages go to window.parent.
   */
  function sendToServer(msg) {
    if (window.parent && window.parent !== window && trustedParentOrigin) {
      window.parent.postMessage(msg, trustedParentOrigin);
    }
  }

  /**
   * Handle incoming messages from the MCP server.
   */
  window.addEventListener("message", function (event) {
    if (!window.parent || window.parent === window) return;
    if (event.source !== window.parent) return;
    if (!trustedParentOrigin || event.origin !== trustedParentOrigin) return;

    const data = event.data;
    if (!data || typeof data !== "object" || !data.type) return;

    switch (data.type) {
      case "response":
        handleServerResponse(data);
        break;
      case "error":
        handleServerError(data);
        break;
    }
  });

  function handleServerResponse(data) {
    setWaiting(false);

    if (data.sessionId) {
      sessionId = data.sessionId;
    }

    // Update phase indicator if provided
    if (data.phase) {
      updatePhaseFromName(data.phase);
    }

    // Render A2UI component tree if present
    if (data.a2ui) {
      const el = renderA2UI(data.a2ui);
      addAssistantBubble(el);
    }

    // Render plain text if present (and no A2UI)
    if (data.text && !data.a2ui) {
      addMessage("assistant", data.text);
    }
  }

  function handleServerError(data) {
    setWaiting(false);
    addMessage("error", data.message || "An error occurred.");
  }

  // ── Chat UI ────────────────────────────────────────────────────────

  function addMessage(role, text) {
    const bubble = document.createElement("div");
    bubble.className = "chat-bubble " + role;
    bubble.setAttribute("role", "article");
    bubble.textContent = text;
    messagesEl.appendChild(bubble);
    scrollToBottom();
  }

  function addAssistantBubble(contentEl) {
    const bubble = document.createElement("div");
    bubble.className = "chat-bubble assistant";
    bubble.setAttribute("role", "article");
    bubble.appendChild(contentEl);
    messagesEl.appendChild(bubble);
    scrollToBottom();
  }

  function setWaiting(val) {
    isWaiting = val;
    sendBtn.disabled = val;
    const existing = messagesEl.querySelector(".typing-indicator");
    if (val && !existing) {
      const indicator = document.createElement("div");
      indicator.className = "typing-indicator";
      indicator.setAttribute("aria-label", "Kickstart is thinking");
      for (var i = 0; i < 3; i++) {
        var dot = document.createElement("span");
        dot.className = "typing-dot";
        indicator.appendChild(dot);
      }
      messagesEl.appendChild(indicator);
      scrollToBottom();
    } else if (!val && existing) {
      existing.remove();
    }
  }

  function scrollToBottom() {
    requestAnimationFrame(function () {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    });
  }

  // ── Input handling ─────────────────────────────────────────────────

  function send() {
    var text = inputEl.value.trim();
    if (!text || isWaiting) return;

    addMessage("user", text);
    inputEl.value = "";
    inputEl.style.height = "auto";
    setWaiting(true);

    if (!sessionId) {
      sendToServer({ type: "kickstart" });
    } else {
      sendToServer({ type: "converse", sessionId: sessionId, message: text });
    }
  }

  inputEl.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  inputEl.addEventListener("input", function () {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
  });

  sendBtn.addEventListener("click", send);

  // ── Phase bar ──────────────────────────────────────────────────────

  var PHASES = [
    { id: "Discover", label: "Discover" },
    { id: "Design",   label: "Design" },
    { id: "Generate", label: "Generate" },
    { id: "Review",   label: "Review" },
    { id: "Handoff",  label: "Handoff" },
    { id: "Deploy",   label: "Deploy" },
  ];

  var currentPhaseIndex = 0;

  function renderPhaseBar() {
    clearChildren(phaseBarEl);
    for (var i = 0; i < PHASES.length; i++) {
      var status = i < currentPhaseIndex ? "completed" : i === currentPhaseIndex ? "active" : "";
      var step = document.createElement("span");
      step.className = "phase-step";

      var dot = document.createElement("span");
      dot.className = "phase-dot" + (status ? " " + status : "");
      step.appendChild(dot);

      var label = document.createElement("span");
      label.textContent = PHASES[i].label;
      step.appendChild(label);
      phaseBarEl.appendChild(step);

      if (i < PHASES.length - 1) {
        var connector = document.createElement("span");
        connector.className = "phase-connector" + (i < currentPhaseIndex ? " completed" : "");
        phaseBarEl.appendChild(connector);
      }
    }
  }

  function updatePhaseFromName(phaseName) {
    for (var i = 0; i < PHASES.length; i++) {
      if (PHASES[i].id === phaseName) {
        currentPhaseIndex = i;
        renderPhaseBar();
        return;
      }
    }
  }

  // ── A2UI Renderer ──────────────────────────────────────────────────
  // Adapted from packages/web/js/framework/a2ui-renderer.js
  // Renders A2UI component descriptors into DOM elements.

  function clearChildren(el) {
    while (el.firstChild) {
      el.removeChild(el.firstChild);
    }
  }

  function createCardHeader(title, subtitle, styleText) {
    var header = document.createElement("div");
    header.className = "card-header";
    if (styleText) header.style.cssText = styleText;

    var content = document.createElement("div");
    if (title) {
      var heading = document.createElement("h3");
      heading.className = "card-title";
      heading.textContent = title;
      content.appendChild(heading);
    }
    if (subtitle) {
      var text = document.createElement("p");
      text.className = "card-subtitle";
      text.textContent = subtitle;
      content.appendChild(text);
    }

    header.appendChild(content);
    return header;
  }

  function createCardBody(styleText) {
    var body = document.createElement("div");
    body.className = "card-body";
    if (styleText) body.style.cssText = styleText;
    return body;
  }

  function sanitizeNavigationUrl(value) {
    if (typeof value !== "string" || !value) return "";
    try {
      var url = new URL(value, window.location.href);
      if (url.protocol === "http:" || url.protocol === "https:") {
        return url.toString();
      }
    } catch (e) {
      return "";
    }
    return "";
  }

  function createNavigationLink(href, label, className, styleText) {
    var safeHref = sanitizeNavigationUrl(href);
    if (!safeHref) {
      var disabled = document.createElement("span");
      disabled.className = className;
      if (styleText) disabled.style.cssText = styleText;
      disabled.textContent = label;
      disabled.setAttribute("aria-disabled", "true");
      disabled.style.opacity = "0.6";
      disabled.style.cursor = "not-allowed";
      return disabled;
    }

    var link = document.createElement("a");
    link.href = safeHref;
    link.className = className;
    link.target = "_blank";
    link.rel = "noopener";
    if (styleText) link.style.cssText = styleText;
    link.textContent = label;
    return link;
  }

  function createStatusIcon(status) {
    var el = document.createElement("span");
    if (status === "completed") {
      el.textContent = "✓";
      el.style.color = "var(--color-success)";
      return el;
    }
    if (status === "running") {
      el.className = "spinner";
      el.style.width = "14px";
      el.style.height = "14px";
      el.style.borderWidth = "2px";
      return el;
    }
    if (status === "error") {
      el.textContent = "✕";
      el.style.color = "var(--color-error)";
      return el;
    }

    el.textContent = "○";
    el.style.color = "var(--color-neutral-foreground-disabled)";
    return el;
  }

  var RENDERERS = {
    Text: renderText,
    Button: renderButton,
    TextField: renderTextField,
    Row: renderRow,
    Column: renderColumn,
    Card: renderCardA2UI,
    Tabs: renderTabs,
    ConversationPhase: renderConversationPhase,
    CodeBlock: renderCodeBlockA2UI,
    ResourcePicker: renderResourcePicker,
    DeploymentProgress: renderDeploymentProgress,
    ArchitectureDiagram: renderArchitectureDiagram,
    CostEstimate: renderCostEstimate,
    HandoffCard: renderHandoffCard,
    RepoPicker: renderRepoPicker,
    WorkflowStatus: renderWorkflowStatus,
    CodespaceLink: renderCodespaceLink,
    AppOverview: renderAppOverview,
  };

  function renderA2UI(schema, ctx) {
    ctx = ctx || {};
    if (Array.isArray(schema)) {
      var wrapper = document.createElement("div");
      for (var i = 0; i < schema.length; i++) {
        wrapper.appendChild(renderA2UI(schema[i], ctx));
      }
      return wrapper;
    }
    if (!schema || typeof schema !== "object") return createFallback(schema);
    if (typeof schema.type !== "string") return createFallback(schema);
    if (!Object.prototype.hasOwnProperty.call(RENDERERS, schema.type)) {
      return createFallback(schema);
    }
    var renderer = RENDERERS[schema.type];
    if (typeof renderer !== "function") return createFallback(schema);
    return renderer(schema, ctx);
  }

  function renderTabs(schema, ctx) {
    var wrapper = document.createElement("div");
    var tabBar = document.createElement("div");
    tabBar.className = "tabs";
    tabBar.setAttribute("role", "tablist");
    var contentArea = document.createElement("div");
    contentArea.className = "tab-content";
    var tabs = schema.tabs || [];
    var activeIndex = schema.activeTab || 0;

    function showTab(index) {
      clearChildren(tabBar);
      clearChildren(contentArea);
      for (var i = 0; i < tabs.length; i++) {
        var btn = document.createElement("button");
        btn.className = "tab-item" + (i === index ? " active" : "");
        btn.setAttribute("role", "tab");
        btn.setAttribute("aria-selected", String(i === index));
        btn.textContent = tabs[i].label;
        (function(idx) { btn.addEventListener("click", function() { showTab(idx); }); })(i);
        tabBar.appendChild(btn);
      }
      var active = tabs[index];
      if (active && active.children) {
        for (var j = 0; j < active.children.length; j++) {
          contentArea.appendChild(renderA2UI(active.children[j], ctx));
        }
      }
    }
    showTab(activeIndex);
    wrapper.appendChild(tabBar);
    wrapper.appendChild(contentArea);
    return wrapper;
  }

  function renderConversationPhase(schema) {
    var el = document.createElement("div");
    el.className = "phase-bar";
    el.style.background = "none";
    el.style.border = "none";
    el.style.padding = "var(--spacing-xs) 0";
    el.setAttribute("aria-label", "Conversation phase");
    var phases = schema.phases || [];
    var current = typeof schema.currentPhase === "number" ? schema.currentPhase : 0;
    // If currentPhase is a string, resolve index
    if (typeof schema.currentPhase === "string") {
      for (var k = 0; k < phases.length; k++) {
        var p = phases[k];
        var pid = typeof p === "string" ? p : p.id;
        if (pid === schema.currentPhase) { current = k; break; }
      }
    }
    for (var i = 0; i < phases.length; i++) {
      var phase = phases[i];
      var label = typeof phase === "string" ? phase : phase.label || phase.id;
      var st = i < current ? "completed" : i === current ? "active" : "";
      var step = document.createElement("span");
      step.className = "phase-step";

      var dot = document.createElement("span");
      dot.className = "phase-dot" + (st ? " " + st : "");
      step.appendChild(dot);

      var textEl = document.createElement("span");
      textEl.textContent = label || "";
      step.appendChild(textEl);
      el.appendChild(step);

      if (i < phases.length - 1) {
        var conn = document.createElement("span");
        conn.className = "phase-connector" + (i < current ? " completed" : "");
        el.appendChild(conn);
      }
    }
    // Also update top-level phase bar
    if (typeof schema.currentPhase === "string") updatePhaseFromName(schema.currentPhase);
    return el;
  }

    tags.style.alignItems = "center";
    if (schema.runtime) {
      var runtime = document.createElement("span");
      runtime.style.display = "inline-block";
      runtime.style.padding = "2px var(--spacing-s)";
      runtime.style.borderRadius = "var(--radius-small)";
      runtime.style.background = "var(--color-brand-background-2)";
      runtime.style.color = "var(--color-brand-foreground-1)";
      runtime.style.fontSize = "var(--font-size-200)";
      runtime.style.fontWeight = "var(--font-weight-semibold)";
      runtime.textContent = schema.runtime;
      tags.appendChild(runtime);
    }
    for (var i = 0; i < services.length; i++) {
      var service = document.createElement("span");
      service.style.display = "inline-block";
      service.style.padding = "2px var(--spacing-s)";
      service.style.borderRadius = "var(--radius-small)";
      service.style.background = "var(--color-neutral-background-3)";
      service.style.fontSize = "var(--font-size-200)";
      service.textContent = services[i];
      tags.appendChild(service);
    }
    body.appendChild(tags);
    if (schema.url) {
      var linkWrap = document.createElement("div");
      linkWrap.style.marginTop = "var(--spacing-m)";
      linkWrap.appendChild(
        createNavigationLink(
          schema.url,
          "🔗 " + schema.url,
          "",
          "font-size:var(--font-size-200);color:var(--color-brand-foreground-1)"
        )
      );
      body.appendChild(linkWrap);
    }
    card.appendChild(body);
    return card;
  }

  function createFallback(schema) {
    var el = document.createElement("div");
    el.style.padding = "var(--spacing-s)";
    el.style.border = "1px dashed var(--color-warning)";
    el.style.borderRadius = "var(--radius-medium)";
    el.style.fontSize = "var(--font-size-200)";
    el.style.color = "var(--color-neutral-foreground-3)";
    el.textContent = "Unknown component: " + (schema && schema.type || "null");
    return el;
  }

  // ── Boot ────────────────────────────────────────────────────────────

  renderPhaseBar();

  // Auto-kickstart on load
  setWaiting(true);
  sendToServer({ type: "kickstart" });

})();
</script>
</body>
</html>
