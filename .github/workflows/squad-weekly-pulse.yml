name: Squad · Weekly Pulse

# Every Monday at 17:00 Pacific, Scribe opens a fresh Discussion summarising
# the prior 7 days. Cron UTC: 00:00 Tuesday UTC = Monday 17:00 PDT.

on:
  schedule:
    - cron: '0 0 * * 2'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  discussions: write

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build weekly body
        id: build
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const weekStart = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);
            const log = fs.existsSync('.squad/retro-log.md')
              ? fs.readFileSync('.squad/retro-log.md', 'utf8')
              : '';

            const lines = log.split('\n').filter(l => /^- \d{4}-\d{2}-\d{2} \| #\d+/.test(l));
            const weekLines = lines.filter(l => {
              const m = l.match(/^- (\d{4}-\d{2}-\d{2})/);
              return m && new Date(m[1]).getTime() >= weekStart.getTime();
            });

            // Compute aggregates
            const merged = weekLines.filter(l => /merged/.test(l)).length;
            const closed = weekLines.filter(l => /\| closed \|/.test(l)).length;
            const rework = weekLines.filter(l => /merged-with-rework/.test(l)).length;

            const reviewTimes = weekLines
              .map(l => l.match(/review=(\d+)m/))
              .filter(Boolean)
              .map(m => parseInt(m[1], 10))
              .sort((a, b) => a - b);
            const medianReview = reviewTimes.length
              ? reviewTimes[Math.floor(reviewTimes.length / 2)]
              : 0;

            const sizes = { S: 0, M: 0, L: 0, XL: 0 };
            weekLines.forEach(l => {
              const m = l.match(/\| ([SMLX]+) \| impl=/);
              if (m && sizes[m[1]] !== undefined) sizes[m[1]]++;
            });

            const body = [
              '**Working as Scribe** · see `.squad/agents/scribe/charter.md`',
              '',
              `## Week of ${weekStart.toISOString().slice(0, 10)} → ${new Date().toISOString().slice(0, 10)}`,
              '',
              '### Numbers',
              `- Merged: **${merged}** (${rework} with rework)`,
              `- Closed without merge: **${closed}**`,
              `- Median review time: **${medianReview}m**`,
              `- Size mix: S=${sizes.S} · M=${sizes.M} · L=${sizes.L} · XL=${sizes.XL}`,
              '',
              '### PRs this week',
              weekLines.length ? weekLines.join('\n') : '_No closed PRs._',
              '',
              '### Prompt for the team',
              '> Anything we should change?',
              '',
              'Reply with one thing. If it warrants work, Leela converts it to a `process` issue. The daily pulse tracks those.',
              '',
              '---',
              '_Generated by `.github/workflows/squad-weekly-pulse.yml`._',
            ].join('\n');

            core.setOutput('body', body);
            core.setOutput('title', `Weekly Pulse · ${new Date().toISOString().slice(0, 10)}`);

      - name: Open weekly pulse as issue (fallback if Discussions unavailable)
        uses: actions/github-script@v8
        env:
          TITLE: ${{ steps.build.outputs.title }}
          BODY: ${{ steps.build.outputs.body }}
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: process.env.TITLE,
              body: process.env.BODY,
              labels: ['squad:scribe', 'pulse:weekly'],
            });
