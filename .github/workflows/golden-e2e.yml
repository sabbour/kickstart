# Golden E2E — 4 tracks with required-for-merge gate
#
# Always runs on every PR to main/dev (no path filter on trigger).
# Internally decides whether to run the full suite or pass-through.
# The `golden-gate` job is the branch-protection required check — fail-closed.

name: Golden E2E

on:
  pull_request:
    branches: [main, dev]
  schedule:
    # Nightly live-model run at 04:00 UTC
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      live_mode:
        description: 'Run against live model (true/false)'
        required: false
        default: 'false'

concurrency:
  group: golden-e2e-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # ── Detect changed paths ────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.filter.outputs.golden }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            golden:
              - 'packages/pack-*/**'
              - 'packages/harness/**'
              - 'packages/web/**'
              - 'playwright.config.ts'
              - 'package-lock.json'
              - 'scripts/record-golden-fixtures.ts'
              - 'scripts/lint-golden-fixtures.ts'
              - '.github/workflows/golden-e2e.yml'
              - 'packages/web/e2e/golden/**'

  # ── Lint fixtures (secret scan + schema + freshness) ────────────
  lint-fixtures:
    name: Lint fixtures
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.should_run == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npx tsx scripts/lint-golden-fixtures.ts --strict

  # ── Golden E2E suite (4 tracks) ────────────────────────────────
  golden-tests:
    name: Golden E2E (${{ matrix.track }})
    runs-on: ubuntu-latest
    needs: [changes, lint-fixtures]
    if: needs.changes.outputs.should_run == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        track: [web-app, agentic-foundry, agentic-kaito, existing-repo-uplift]
    env:
      # Fixture mode by default; live mode only on schedule or explicit dispatch
      GOLDEN_LIVE_MODE: ${{ (github.event_name == 'schedule' || github.event.inputs.live_mode == 'true') && 'true' || 'false' }}
      # Nightly recording runs via schedule use sabbour-squad-tester[bot] app token
      GOLDEN_E2E_MODEL_KEY: ${{ secrets.GOLDEN_E2E_MODEL_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Build
        run: npm run build
      - name: Run golden E2E — ${{ matrix.track }}
        run: npx playwright test --project=golden --grep="${{ matrix.track }}"
        env:
          CI: true
          # Disable trace/video for live runs to prevent credential leakage
          PLAYWRIGHT_TRACE: ${{ env.GOLDEN_LIVE_MODE == 'true' && 'off' || 'on-first-retry' }}
          PLAYWRIGHT_VIDEO: 'off'
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: golden-e2e-report-${{ matrix.track }}
          path: playwright-report/
          retention-days: 7

  # ── Gate meta-tests (seeded failure verification) ───────────────
  gate-meta:
    name: Gate meta-tests
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.should_run == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - name: Run gate meta-tests
        run: npx playwright test --project=golden --grep="gate meta"
        env:
          CI: true

  # ── Golden gate (required check — always runs, fail-closed) ─────
  golden-gate:
    name: Golden e2e (4 tracks)
    runs-on: ubuntu-latest
    if: always()
    needs: [changes, lint-fixtures, golden-tests, gate-meta]
    steps:
      - name: Evaluate gate
        run: |
          echo "=== Golden E2E Gate ==="
          echo "Changes detected: ${{ needs.changes.outputs.should_run }}"
          echo "Lint result: ${{ needs.lint-fixtures.result }}"
          echo "Tests result: ${{ needs.golden-tests.result }}"
          echo "Meta result: ${{ needs.gate-meta.result }}"

          SHOULD_RUN="${{ needs.changes.outputs.should_run }}"
          EVENT="${{ github.event_name }}"

          # If golden-relevant changes were detected (or schedule/dispatch), all jobs must succeed
          if [[ "$SHOULD_RUN" == "true" || "$EVENT" == "schedule" || "$EVENT" == "workflow_dispatch" ]]; then
            if [[ "${{ needs.lint-fixtures.result }}" != "success" ]]; then
              echo "❌ Fixture lint failed"
              exit 1
            fi
            if [[ "${{ needs.golden-tests.result }}" != "success" ]]; then
              echo "❌ Golden tests failed"
              exit 1
            fi
            if [[ "${{ needs.gate-meta.result }}" != "success" ]]; then
              echo "❌ Gate meta-tests failed"
              exit 1
            fi
            echo "✅ Golden E2E gate passed (full run)"
          else
            echo "✅ Golden E2E gate passed (no relevant changes)"
          fi
