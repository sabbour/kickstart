name: Squad Review Gate

on:
  pull_request_review:
    types: [submitted, dismissed]
  issue_comment:
    types: [created]
  pull_request:
    types: [labeled, unlabeled, opened, synchronize, reopened]

concurrency:
  group: squad-review-gate-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  gate:
    name: Review Gate
    # Skip issue_comment events that aren't on PRs
    if: github.event_name != 'issue_comment' || github.event.issue.pull_request
    uses: ./.github/workflows/squad-review-gate.yml
    with:
      roles: 'codereview,security'
      pr_number: ${{ github.event.pull_request.number || github.event.issue.number }}
    secrets: inherit
