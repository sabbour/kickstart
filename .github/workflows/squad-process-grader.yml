name: Squad · Process Grader

# Daily at 08:00 UTC, grade open `process` issues whose Revisit: date has
# passed by comparing the latest `.squad/velocity.md` snapshot against the
# hypothesis frontmatter. Posts a grade comment, applies exactly one of
# process:succeeded / process:no-effect / process:reverted, extends the
# revisit window on no-effect (up to 2x), and drops a Scribe inbox entry.
#
# Design proposal: issue #805 revised DP (comment 4288711193).

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

concurrency:
  group: squad-process-grader
  cancel-in-progress: false

permissions:
  issues: write
  contents: write
  pull-requests: none
  actions: read

jobs:
  grade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare target branch
        run: |
          set -e
          TARGET_BRANCH="${{ github.event.repository.default_branch }}"
          git fetch origin "$TARGET_BRANCH"
          git checkout "$TARGET_BRANCH" || git checkout -B "$TARGET_BRANCH" "origin/$TARGET_BRANCH"
          git reset --hard "origin/$TARGET_BRANCH"

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install js-yaml (grader dep)
        run: npm install --no-save --no-audit --no-fund js-yaml@^4.1.1

      - name: Run process grader
        id: grade
        uses: actions/github-script@v8
        env:
          NODE_PATH: ${{ github.workspace }}/node_modules
        with:
          script: |
            const fs = require('node:fs/promises');
            const path = require('node:path');
            const { pathToFileURL } = require('node:url');
            const grader = await import(pathToFileURL(path.resolve('.squad/scripts/process-grader.mjs')).href);
            const summary = await grader.runGrader({ github, context, core, fs });
            core.setOutput('aborted', String(!!summary.aborted));
            core.setOutput('graded-count', String((summary.graded || []).filter((r) => !r.skipped).length));
            core.setOutput('deferred-count', String(summary.deferredCount || 0));
            core.info(JSON.stringify(summary, null, 2));

      - name: Commit inbox + revisit updates
        if: steps.grade.outputs.aborted != 'true'
        run: |
          set -e
          if git diff --quiet -- .squad/decisions/inbox/; then
            echo "No inbox changes to commit."
            exit 0
          fi
          git config user.name "squad-process-grader[bot]"
          git config user.email "squad-process-grader[bot]@users.noreply.github.com"
          git add .squad/decisions/inbox/
          git commit -m "chore(squad): record process grades [skip ci]"
          git push origin "${{ github.event.repository.default_branch }}"
