name: CI

on:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs-site/**'
      - 'docs/**'
      - '.squad/**'
      - '.changeset/**'
      - '**/*.md'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    # Always runs so downstream `needs: [changes]` jobs are never skipped due to a
    # skipped dependency. For non-PR events (push to main, workflow_dispatch) the job
    # short-circuits and emits docs_only=false, dockerfiles_changed=true so heavy
    # jobs run unconditionally.
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
      dockerfiles_changed: ${{ steps.filter.outputs.dockerfiles_changed }}
    steps:
      - name: Classify PR file changes
        id: filter
        uses: actions/github-script@v8
        with:
          script: |
            // Non-PR events (push, workflow_dispatch, schedule, …) always run the full pipeline.
            if (context.eventName !== 'pull_request') {
              core.setOutput('docs_only', 'false');
              core.setOutput('dockerfiles_changed', 'true');
              core.info(`event=${context.eventName} — running full pipeline (docs_only=false, dockerfiles_changed=true)`);
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const paths = files.map(f => f.filename);
            // docs_only: every changed path is markdown OR lives in a docs / .squad /
            // .changeset directory. None of these surfaces ship runtime code, so the
            // heavy lint/build/test job is safe to skip for them.
            const isDocsLike = (p) =>
              p.endsWith('.md') ||
              p.endsWith('.mdx') ||
              p.startsWith('docs/') ||
              p.startsWith('docs-site/') ||
              p.startsWith('.squad/') ||
              p.startsWith('.changeset/');
            const docsOnly = paths.length > 0 && paths.every(isDocsLike);
            const dockerfilesChanged = paths.some(p =>
              /(^|\/)Dockerfile(\.[\w-]+)?$/i.test(p) ||
              p.endsWith('.dockerignore')
            );
            core.setOutput('docs_only', String(docsOnly));
            core.setOutput('dockerfiles_changed', String(dockerfilesChanged));
            core.info(`changed=${paths.length} docs_only=${docsOnly} dockerfiles_changed=${dockerfilesChanged}`);

  lint-build:
    name: Lint, Build & Unit Tests
    runs-on: ubuntu-latest
    needs: [changes]
    # Skip the heavy job only when a PR is docs-only. For all other events (push to
    # main, workflow_dispatch, code PRs) `changes` reports docs_only=false and this
    # job runs. ci-gate aggregator treats `skipped` as success, so the required
    # `CI Gate` check still goes green for docs-only PRs.
    if: needs.changes.outputs.docs_only != 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch main branch for changeset status
        run: git fetch origin main:main --deepen=50 || git fetch origin main:main

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://npm.pkg.github.com"
          scope: "@aks-kickstart"
          always-auth: true

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install hadolint
        # Only install when Dockerfiles changed. `changes` reports
        # dockerfiles_changed=true for all non-PR events (push to main, dispatch),
        # so non-PR runs always install.
        if: needs.changes.outputs.dockerfiles_changed == 'true'
        run: |
          HADOLINT_VERSION="v2.12.0"
          HADOLINT_SHA256="56de6d5e5ec427e17b74fa48d51271c7fc0d61244bf5c90e828aab8362d55010"
          curl -sL "https://github.com/hadolint/hadolint/releases/download/${HADOLINT_VERSION}/hadolint-Linux-x86_64" -o hadolint
          echo "${HADOLINT_SHA256}  hadolint" | sha256sum --check --strict
          chmod +x hadolint
          sudo mv hadolint /usr/local/bin/hadolint
          hadolint --version

      - name: TypeScript check (web)
        run: cd packages/web && npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run

      - name: Validate microsoft-skills.json schema (#243)
        run: |
          node << 'VALIDATE_EOF'
          const Ajv = require('ajv');
          const fs = require('fs');
          const ajv = new Ajv({ allErrors: true, format: 'full', schemaId: 'auto' });
          const schema = JSON.parse(fs.readFileSync('config/schemas/microsoft-skills.schema.json', 'utf-8'));
          // Strip 2020-12 meta fields for AJV v6 compatibility; rewrite $defs -> definitions
          delete schema['$schema'];
          delete schema['$id'];
          if (schema['$defs'] && !schema['definitions']) {
            schema['definitions'] = schema['$defs'];
            delete schema['$defs'];
          }
          if (schema.additionalProperties && schema.additionalProperties['$ref']) {
            schema.additionalProperties['$ref'] = schema.additionalProperties['$ref'].replace('#/$defs/', '#/definitions/');
          }
          const validate = ajv.compile(schema);
          const data = JSON.parse(fs.readFileSync('config/microsoft-skills.json', 'utf-8'));
          const valid = validate(data);
          if (!valid) {
            console.error('::error::config/microsoft-skills.json failed schema validation:');
            console.error(JSON.stringify(validate.errors, null, 2));
            process.exit(1);
          }
          console.log('✓ config/microsoft-skills.json is valid (' + Object.keys(data).length + ' entries)');
          VALIDATE_EOF

      - name: Auth bypass regression gate (#23)
        run: |
          # Fail if any auth bypass env var references exist in API source
          # Exclude test files (*.test.ts, *.spec.ts) which may contain these strings for regression tests
          if grep -rE "DEV_AUTH_BYPASS|KICKSTART_DEV_AUTH_BYPASS" packages/web/api/src/ \
             --exclude="*.test.ts" --exclude="*.spec.ts"; then
            echo "::error::Auth bypass reference found in API source code. This is forbidden per issue #23."
            exit 1
          fi
          echo "✓ No auth bypass references found"

      - name: Zod lockfile convergence check (#247)
        run: |
          set -eu
          NODE_VERSIONS=$(node -e "
            const lock = require('./package-lock.json');
            const versions = new Set();
            for (const [path, pkg] of Object.entries(lock.packages || {})) {
              if (/(?:^|\/)node_modules\/zod$/.test(path) && pkg.version) {
                versions.add(pkg.version);
              }
            }
            console.log(JSON.stringify([...versions]));
          ")
          echo "Resolved zod versions: $NODE_VERSIONS"
          COUNT=$(echo "$NODE_VERSIONS" | jq 'length')
          if [ "$COUNT" -ne 1 ]; then
            echo "::error::Multiple Zod versions detected: $NODE_VERSIONS — see #247 / .squad/skills/zod-monorepo-split/SKILL.md"
            exit 1
          fi
          echo "✅ Single Zod version: $NODE_VERSIONS"

      - name: Zod source pin check (#247)
        run: |
          set -eu
          BAD=$(grep -rE '"zod":\s*"\^?3' packages/ harness/ 2>/dev/null || true)
          if [ -n "$BAD" ]; then
            echo "::error::Found zod v3 pin in package.json:"
            echo "$BAD"
            exit 1
          fi
          echo "✅ No zod v3 pins in workspace package.json files"

      - name: Detect docs-gate scope
        id: docs_gate
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const paths = files.map(file => file.filename);
            const labels = context.payload.pull_request.labels.map(label => label.name);

            const userFacing = paths.some(path =>
              /^packages\/[^/]+\/src\//.test(path) &&
              !path.includes('__tests__') &&
              !path.endsWith('.test.ts') &&
              !path.endsWith('.test.tsx') &&
              !path.includes('/e2e/')
            );
            const hasDocsSite = paths.some(path => path.startsWith('docs-site/docs/'));
            // Docs waiver labels: use `docs:not-applicable` or `docs:approved` to
            // signal that no changeset/docs update is needed for this PR.
            const docsWaived = labels.includes('docs:not-applicable') || labels.includes('docs:approved');
            const requireChangeset = userFacing && !hasDocsSite && !docsWaived;

            core.setOutput('requireChangeset', String(requireChangeset));

      - name: Guard against smoke gate regression
        run: |
          if grep -nE 'exit 0' .github/workflows/deploy-swa.yml | grep -iE 'smoke|production_url|base_url'; then
            echo "::error file=.github/workflows/deploy-swa.yml::Regression: smoke-resolve step uses exit 0 (silent skip). Must be exit 1."
            exit 1
          fi
          if grep -nE 'continue-on-error:\s*true' .github/workflows/deploy-swa.yml; then
            echo "::error file=.github/workflows/deploy-swa.yml::Regression: continue-on-error:true in deploy-swa workflow. Smoke chain must fail loudly."
            exit 1
          fi
          echo "✅ Smoke gate integrity verified"

      - name: Guard against useAzureMonitor double-init regression
        run: |
          # Protects the single-init invariant from DP #1030 / DP #1035.
          # The real regression pattern is *multiple* useAzureMonitor() call-sites
          # in appinsights.ts — a second call wipes the OTel global registry and
          # re-wires the exporter pipeline, bypassing RedactingSpanExporter.
          # Count call-sites (literal `useAzureMonitor(`). Expect exactly one.
          APP_INSIGHTS=packages/web/api/src/lib/appinsights.ts
          if [ ! -f "$APP_INSIGHTS" ]; then
            echo "::error file=$APP_INSIGHTS::Guard failed: expected file not found."
            exit 1
          fi
          count=$(grep -cE '\buseAzureMonitor[[:space:]]*\(' "$APP_INSIGHTS" || true)
          if [ "$count" != "1" ]; then
            echo "::error file=$APP_INSIGHTS::Regression: expected exactly 1 reference to useAzureMonitor( in appinsights.ts, found $count. Multiple call-sites re-initialize the OTel global TracerProvider and break the single-path redaction pipeline (DP #1030 / DP #1035). Zero references means the documented invariant anchor was removed."
            exit 1
          fi
          echo "✅ appinsights.ts useAzureMonitor single-init invariant verified (count=1)"

      - name: Changeset status
        if: steps.docs_gate.outputs.requireChangeset == 'true'
        run: |
          # Create a local main branch for changesets to compare against
          git fetch origin main:main --no-tags || git fetch origin main:main
          npx changeset status

  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    # Disabled to save CI minutes — re-enable by removing `if: false`
    if: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://npm.pkg.github.com"
          scope: "@aks-kickstart"
          always-auth: true

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build all workspaces
        run: npm run build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Playwright E2E tests
        run: npx playwright test

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [changes, lint-build, e2e]
    if: always()
    steps:
      - name: Check results
        run: |
          changes_result="${{ needs.changes.result }}"
          lint_build_result="${{ needs.lint-build.result }}"
          e2e_result="${{ needs.e2e.result }}"

          # `changes` must succeed (it gates whether lint-build is allowed to skip).
          # A failure here would otherwise cascade-skip lint-build and falsely turn
          # CI Gate green.
          if [[ "$changes_result" != "success" ]]; then
            echo "CI failed: changes=${changes_result}"
            exit 1
          fi
          if [[ ! "$lint_build_result" =~ ^(success|skipped)$ || ! "$e2e_result" =~ ^(success|skipped)$ ]]; then
            echo "CI failed: lint-build=${lint_build_result}, e2e=${e2e_result}"
            exit 1
          fi
          echo "CI passed: changes=${changes_result}, lint-build=${lint_build_result}, e2e=${e2e_result}"
