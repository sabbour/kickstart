name: CI

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  classify-trusted-retro-log-pr:
    name: Classify trusted retro-log PR
    runs-on: ubuntu-latest
    outputs:
      trusted_retro_log_pr: ${{ steps.classify.outputs.trusted_retro_log_pr }}
    steps:
      - name: Classify trusted retro-log PR
        id: classify
        uses: actions/github-script@v8
        with:
          script: |
            const TRUSTED_RETRO_LABEL = 'retro-log';
            const TRUSTED_RETRO_BRANCH_PREFIX = 'retro-log/pr-';
            const TRUSTED_RETRO_AUTHORS = new Set(['github-actions[bot]', 'sabbour-squad-scribe[bot]']);
            const TRUSTED_RETRO_ONLY_PATHS = new Set(['.squad/retro-log.md']);

            async function listChangedFiles(prNumber) {
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                per_page: 100,
              });
              return files.map((file) => file.filename);
            }

            const pr = context.payload.pull_request;
            const labels = new Set((pr.labels ?? []).map((label) => label.name));
            const changedFiles = await listChangedFiles(pr.number);
            const trustedRetroLogPr = (
              labels.has(TRUSTED_RETRO_LABEL) &&
              TRUSTED_RETRO_AUTHORS.has(pr.user?.login ?? '') &&
              (pr.head?.ref ?? '').startsWith(TRUSTED_RETRO_BRANCH_PREFIX) &&
              changedFiles.length > 0 &&
              changedFiles.every((filename) => TRUSTED_RETRO_ONLY_PATHS.has(filename))
            );

            core.setOutput('trusted_retro_log_pr', trustedRetroLogPr ? 'true' : 'false');

  lint-build:
    name: Lint, Build & Unit Tests
    runs-on: ubuntu-latest
    needs: [classify-trusted-retro-log-pr]
    if: needs.classify-trusted-retro-log-pr.outputs.trusted_retro_log_pr != 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch main branch for changeset status
        run: git fetch origin main:main --depth=1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://npm.pkg.github.com"
          scope: "@aks-kickstart"
          always-auth: true

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint
        run: npm run lint

      - name: Build all workspaces
        run: npm run build

      - name: TypeScript check (web)
        run: cd packages/web && npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run

      - name: Detect docs-gate scope
        id: docs_gate
        uses: actions/github-script@v8
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const paths = files.map(file => file.filename);
            const labels = context.payload.pull_request.labels.map(label => label.name);

            const userFacing = paths.some(path =>
              /^packages\/[^/]+\/src\//.test(path) &&
              !path.includes('__tests__') &&
              !path.endsWith('.test.ts') &&
              !path.endsWith('.test.tsx') &&
              !path.includes('/e2e/')
            );
            const hasDocsSite = paths.some(path => path.startsWith('docs-site/docs/'));
            const skipDocs = labels.includes('skip-docs');
            const requireChangeset = userFacing && !hasDocsSite && !skipDocs;

            core.setOutput('requireChangeset', String(requireChangeset));

      - name: Changeset status
        if: steps.docs_gate.outputs.requireChangeset == 'true'
        run: npx changeset status

  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: [classify-trusted-retro-log-pr]
    if: needs.classify-trusted-retro-log-pr.outputs.trusted_retro_log_pr != 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://npm.pkg.github.com"
          scope: "@aks-kickstart"
          always-auth: true

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build all workspaces
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Playwright E2E tests
        run: npx playwright test

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [classify-trusted-retro-log-pr, lint-build, e2e]
    if: always()
    steps:
      - name: Check results
        run: |
          classify_result="${{ needs.classify-trusted-retro-log-pr.result }}"
          lint_build_result="${{ needs.lint-build.result }}"
          e2e_result="${{ needs.e2e.result }}"

          if [[ "$classify_result" != "success" || ! "$lint_build_result" =~ ^(success|skipped)$ || ! "$e2e_result" =~ ^(success|skipped)$ ]]; then
            echo "CI failed: classify=${classify_result}, lint-build=${lint_build_result}, e2e=${e2e_result}"
            exit 1
          fi
          echo "CI passed: classify=${classify_result}, lint-build=${lint_build_result}, e2e=${e2e_result}"
