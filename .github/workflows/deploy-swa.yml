name: Deploy to Azure Static Web Apps

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'

permissions:
  contents: read

jobs:
  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: Deploy to Azure Static Web Apps
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build -w @kickstart/core
          npm run build -w @kickstart/api

      - name: Build web app (Vite)
        run: cd packages/web && npx vite build

      - name: Deploy to Azure Static Web Apps
        id: swa_deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "packages/web/dist"
          api_location: "packages/web/api"
          output_location: ""
          skip_app_build: true
          skip_api_build: false
          api_build_command: "echo 'API already built'"

      - name: Smoke test live /api/health
        env:
          LIVE_APP_URL: https://kickstart.aks.azure.sabbour.me
        run: |
          node <<'NODE'
          (async () => {
            const url = `${process.env.LIVE_APP_URL}/api/health`;
            const attempts = Number(process.env.SMOKE_ATTEMPTS ?? '6');
            const delayMs = Number(process.env.SMOKE_DELAY_MS ?? '10000');
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            for (let attempt = 1; attempt <= attempts; attempt += 1) {
              console.log(`Attempt ${attempt}/${attempts}: probing ${url}`);

              try {
                const response = await fetch(url, { signal: AbortSignal.timeout(5000) });
                const text = await response.text();

                if (!response.ok) {
                  throw new Error(`HTTP ${response.status}${text ? ` — ${text.slice(0, 200)}` : ''}`);
                }

                let payload;
                try {
                  payload = JSON.parse(text);
                } catch {
                  throw new Error(`Non-JSON response: ${text.slice(0, 200)}`);
                }

                if (payload.status !== 'ok') {
                  throw new Error(`Unexpected payload: ${text.slice(0, 200)}`);
                }

                console.log(`✅ Live /api/health is healthy: ${text}`);
                return;
              } catch (error) {
                const message = error instanceof Error ? error.message : String(error);
                console.error(`Attempt ${attempt}/${attempts} failed: ${message}`);

                if (attempt === attempts) {
                  process.exit(1);
                }

                await sleep(delayMs);
              }
            }
          })().catch((error) => {
            const message = error instanceof Error ? error.stack ?? error.message : String(error);
            console.error(message);
            process.exit(1);
          });
          NODE
