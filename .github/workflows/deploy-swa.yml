name: Deploy to Azure Static Web Apps

on:
  workflow_dispatch:
  push:
    branches:
      - dev
      - main
    tags:
      - "v*"
    paths:
      - '.github/workflows/deploy-swa.yml'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - 'tsconfig.json'

permissions:
  contents: read

jobs:
  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: Deploy to Azure Static Web Apps
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build all workspaces
        run: npm run build

      - name: Verify API dist
        run: test -f packages/web/api/dist/functions/health.js || (echo "❌ API bundle not found at packages/web/api/dist/functions/" && exit 1)

      - name: Verify OTel externals bundled (not materialized)
        # Regression guard for https://github.com/azure-management-and-platforms/kickstart/issues/1041
        # Post-PR #1051: OTel packages are bundled INLINE into function bundles via esbuild.
        # The old materialize step was deleted — node_modules/ must NOT contain OTel.
        # If this fails: the revert regressed or esbuild externals got re-broken.
        run: |
          if [ -d packages/web/api/node_modules/@azure/monitor-opentelemetry ]; then
            echo "❌ @azure/monitor-opentelemetry found in node_modules/ — revert contract violated. See issue #1041/#1051"
            exit 1
          fi
          # Guard: AzureMonitorTraceExporter is the named export imported by
          # packages/web/api/src/lib/appinsights.ts:57. The identifier survives
          # verbatim because packages/web/api/esbuild.config.mjs has no
          # minify/mangle. If minify is ever enabled, swap this to a more
          # stable sentinel. See issue #1041/#1051 and DP #1035.
          grep -q "AzureMonitorTraceExporter" packages/web/api/dist/functions/health.js || {
            echo "❌ AzureMonitorTraceExporter not found in health.js — OTel exporter was externalized."
            echo "   Check packages/web/api/esbuild.config.mjs externals list and"
            echo "   scripts/verify-api-externals.mjs MUST_BE_INLINED."
            echo "   See DP #1035 (PII double-export contract) and issue #1095."
            exit 1
          }
          echo "✅ OTel bundled inline; node_modules/ clean"

      - name: Deploy to Azure Static Web Apps
        id: swa_deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "packages/web/dist"
          api_location: "packages/web/api"
          output_location: ""
          skip_app_build: true
          skip_api_build: true

      - name: Resolve smoke test target
        id: production_url
        run: |
          # SWA action sets static_web_app_url; use it instead of parameter file
          DEPLOYMENT_URL="${{ steps.swa_deploy.outputs.static_web_app_url }}"
          if [ -z "$DEPLOYMENT_URL" ]; then
            echo "::error::SWA deploy produced no URL — cannot smoke check" >&2
            exit 1
          fi
          echo "base_url=${DEPLOYMENT_URL}" >> "$GITHUB_OUTPUT"

      - name: Smoke check live API health
        env:
          SWA_HEALTHCHECK_URL: ${{ steps.production_url.outputs.base_url }}/api/health
        run: node scripts/check-swa-health.mjs

      - name: Smoke check live API packs registry
        env:
          SWA_HEALTHCHECK_URL: ${{ steps.production_url.outputs.base_url }}/api/packs
          SWA_HEALTHCHECK_REQUIRE_JSON_OK: "false"
        run: node scripts/check-swa-health.mjs


