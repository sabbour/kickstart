name: Deploy to Azure Static Web Apps

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - '.github/workflows/deploy-swa.yml'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - 'tsconfig.json'

permissions:
  contents: read

jobs:
  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: Deploy to Azure Static Web Apps
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build

      - name: Build web app (Vite)
        run: cd packages/web && npx vite build

      - name: Pre-build API to resolve workspace packages
        run: |
          cd packages/web/api
          npm install --production

      - name: Deploy to Azure Static Web Apps
        id: swa_deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "packages/web/dist"
          api_location: "packages/web/api"
          output_location: ""
          skip_app_build: true
          skip_api_build: true

      - name: Resolve production smoke target
        id: production_url
        run: |
          BASE_URL="$(node -e "const params = require('./infra/parameters.dev.json'); const host = params.parameters.customDomainHostname?.value; if (!host) { throw new Error('infra/parameters.dev.json is missing parameters.customDomainHostname.value'); } process.stdout.write('https://' + host);")"
          echo "base_url=$BASE_URL" >> "$GITHUB_OUTPUT"

      - name: Smoke check live API health
        continue-on-error: true
        env:
          SWA_HEALTHCHECK_URL: ${{ steps.production_url.outputs.base_url }}/api/health
        run: node scripts/check-swa-health.mjs
