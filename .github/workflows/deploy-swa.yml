name: Deploy to Azure Static Web Apps

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Deploy to Azure Static Web Apps
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build -w @kickstart/core
          npm run build -w @kickstart/api

      - name: Bundle core into API node_modules
        run: |
          mkdir -p packages/web/api/node_modules/@kickstart/core
          cp -r packages/core/dist packages/web/api/node_modules/@kickstart/core/
          cp packages/core/package.json packages/web/api/node_modules/@kickstart/core/
          cp -r packages/core/src/catalog/kickstart-catalog.json packages/web/api/node_modules/@kickstart/core/dist/catalog/ 2>/dev/null || true

      - name: Deploy to Azure Static Web Apps
        id: swa_deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "packages/web"
          api_location: "packages/web/api"
          skip_app_build: true
          skip_api_build: true

  close_staging:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close staging environment
    steps:
      - name: Close staging environment
        id: close_staging
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
