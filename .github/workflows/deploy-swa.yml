name: Deploy to Azure Static Web Apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Deploy to Azure Static Web Apps
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build -w @kickstart/core
          npm run build -w @kickstart/api

      - name: Stamp build metadata
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          PKG_VERSION=$(node -p "require('./packages/web/package.json').version")
          sed -i "s|window.__BUILD_SHA__ = 'dev';|window.__BUILD_SHA__ = '${SHORT_SHA}';|" packages/web/index.html
          sed -i "s|window.__BUILD_VERSION__ = '0.1.0';|window.__BUILD_VERSION__ = '${PKG_VERSION}';|" packages/web/index.html

      - name: Build web app (Vite)
        run: cd packages/web && npx vite build

      - name: Deploy to Azure Static Web Apps
        id: swa_deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "packages/web/dist"
          api_location: "packages/web/api"
          output_location: ""
          skip_app_build: true
          skip_api_build: false
          api_build_command: "echo 'API already built'"

  close_staging:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close staging environment
    steps:
      - name: Close staging environment
        id: close_staging
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
