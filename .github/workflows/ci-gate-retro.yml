name: CI Gate (retro-log bypass)

# Triggered by the squad-pr-retro workflow after creating a retro-log PR.
# Runs a job named "ci-gate" so the ruleset required check is satisfied
# without running the full CI suite on metadata-only changes.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Retro-log PR number'
        required: true
        type: string

permissions:
  checks: write

jobs:
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    steps:
      - name: Retro-log PR — CI not required
        run: echo "Retro-log PR #${{ inputs.pr_number }} — CI skipped by design."
