name: Squad · Daily Pulse

# Scribe refreshes a single rolling issue every day at 17:00 Pacific.
# Cron is UTC: 00:00 UTC = 17:00 PDT / 16:00 PST.
# Shift to `0 1 * * *` during PST (roughly Nov-Mar) to keep 17:00 local.

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  pulse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build daily pulse body
        id: build
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const since = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();

            // Retro log — last 24h entries
            const log = fs.existsSync('.squad/retro-log.md')
              ? fs.readFileSync('.squad/retro-log.md', 'utf8')
              : '';
            const today = new Date().toISOString().slice(0, 10);
            const yesterday = new Date(Date.now() - 24*60*60*1000).toISOString().slice(0, 10);
            const recentPrs = log.split('\n')
              .filter(l => l.startsWith(`- ${today}`) || l.startsWith(`- ${yesterday}`))
              .join('\n') || '_No PRs closed in the last 24h._';

            // Open PRs aging >3d
            const openPrs = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const threeDaysAgo = Date.now() - 3 * 24 * 60 * 60 * 1000;
            const aging = openPrs
              .filter(p => new Date(p.created_at).getTime() < threeDaysAgo)
              .map(p => `- #${p.number} "${p.title}" — opened ${new Date(p.created_at).toISOString().slice(0,10)} by @${p.user?.login}`)
              .join('\n') || '_None._';

            // Open process-improvement issues
            const processIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'process',
              per_page: 100,
            });
            const processList = processIssues
              .filter(i => !i.pull_request)
              .map(i => `- #${i.number} "${i.title}"`)
              .join('\n') || '_No open `process` issues._';

            const body = [
              '**Working as Scribe** · see `.squad/agents/scribe/charter.md`',
              '',
              `_Rolling daily pulse — last updated ${new Date().toISOString()}_`,
              '',
              '## Closed in the last 24h',
              '```',
              recentPrs,
              '```',
              '',
              '## Open PRs aging > 3 days',
              aging,
              '',
              '## Open `process` issues',
              processList,
              '',
              '---',
              '_Updated daily at 17:00 Pacific by `.github/workflows/squad-daily-pulse.yml`. The weekly pulse aggregates these into a Discussion every Monday._',
            ].join('\n');

            core.setOutput('body', body);

      - name: Upsert rolling daily-pulse issue
        uses: actions/github-script@v8
        with:
          script: |
            const title = '📊 Daily Pulse (rolling)';
            const body = process.env.BODY;
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'squad:scribe,pulse:daily',
              per_page: 20,
            });
            const match = existing.find(i => !i.pull_request && i.title === title);
            if (match) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['squad:scribe', 'pulse:daily'],
              });
            }
        env:
          BODY: ${{ steps.build.outputs.body }}
