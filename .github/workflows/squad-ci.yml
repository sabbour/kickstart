name: Squad CI

on:
  pull_request:
    branches: [dev, preview, main, insider]
    types: [opened, synchronize, reopened]
    paths:
      - 'test/**'
      - 'packages/squad-cli/**'
      - '.squad/scripts/**'
      - '.squad/templates/**'
  push:
    branches: [dev, insider]
    paths:
      - 'test/**'
      - 'packages/squad-cli/**'
      - '.squad/scripts/**'
      - '.squad/templates/**'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Run tests
        run: node --test test/*.test.cjs
