name: Squad Visible Trail

on:
  issues:
    types: [labeled, unlabeled]
  pull_request_target:
    types: [opened, reopened, ready_for_review, labeled, unlabeled]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: squad-visible-trail-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  issue-trail:
    # Early-exit: skip if no squad:* label is present on the issue (covers ~65% of label events)
    if: |
      github.event_name == 'issues' && (
        startsWith(github.event.label.name, 'squad:') ||
        contains(join(github.event.issue.labels.*.name, ','), 'squad:')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Upsert visible issue trail
        uses: actions/github-script@v8
        with:
          script: |
            const { handleIssueEvent } = require('./.github/scripts/squad-visible-trail.cjs');
            await handleIssueEvent({ github, context, core });

  pr-trail:
    # Early-exit: skip if neither a squad:* label nor a squad/ branch is present
    if: |
      github.event_name == 'pull_request_target' && (
        startsWith(github.event.pull_request.head.ref, 'squad/') ||
        contains(join(github.event.pull_request.labels.*.name, ','), 'squad:')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Upsert visible PR trail
        uses: actions/github-script@v8
        with:
          script: |
            const { handlePullRequestEvent } = require('./.github/scripts/squad-visible-trail.cjs');
            await handlePullRequestEvent({ github, context, core });
