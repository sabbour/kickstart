name: Squad Review Gate

# Merged from squad-docs-gate.yml (eliminated ~320 redundant runs/week).
# This single job now handles both squad approval label checking and
# docs/changeset enforcement, halving the per-PR Actions minute cost.

on:
  pull_request:
    types: [labeled, unlabeled, opened, reopened, ready_for_review, synchronize]

concurrency:
  group: squad-review-gate-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  check-squad-approval:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Check squad approval labels
        uses: actions/github-script@v8
        with:
          script: |
            const LOW_RISK_LABEL = 'squad:chore-auto';
            const SENSITIVE_PATH_PATTERNS = [
              /^\.github\/workflows\//i,
              /(^|[\/._-])(auth|guardrail|guardrails|security)([\/._-]|$)/i,
            ];

            function isSecurityPatch(pr, labels) {
              const securitySignals = [
                pr.title,
                pr.body,
                pr.head?.ref,
                ...labels,
              ].filter(Boolean).join(' ');
              return /security|cve-\d{4}-\d+|ghsa-|vuln|vulnerability/i.test(securitySignals);
            }

            function isSensitivePath(filename) {
              return SENSITIVE_PATH_PATTERNS.some((pattern) => pattern.test(filename));
            }

            async function listChangedFiles(prNumber) {
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                per_page: 100,
              });
              return files.map((file) => file.filename);
            }

            const pr = context.payload.pull_request;
            const labels = new Set(pr.labels.map((label) => label.name));
            const changedFiles = await listChangedFiles(pr.number);
            const docsApproved = labels.has('docs:approved');
            const skipDocs = labels.has('skip-docs') || labels.has('docs:not-applicable');
            const docsRejected = labels.has('docs:rejected');
            const isLowRisk = labels.has(LOW_RISK_LABEL);
            const isArchitecturePR = labels.has('architecture');
            const touchesSensitivePaths = changedFiles.some(isSensitivePath);
            const hasSecuritySignals = isSecurityPatch(pr, labels);

            const requiresSecurity = !isLowRisk || hasSecuritySignals || touchesSensitivePaths;
            const requiredApprovals = ['codereview:approved'];
            if (requiresSecurity) {
              requiredApprovals.push('security:approved');
            }
            if (isArchitecturePR) {
              requiredApprovals.push('architecture:approved');
            }

            const hasDocsMarker = docsApproved || skipDocs;

            const missingApprovals = requiredApprovals.filter((label) => !labels.has(label));
            const docsStatus = docsApproved ? '✅' : skipDocs ? '➖ N/A' : '⏳';
            const reviewerStatusParts = requiredApprovals.map((label) => {
              const name = label.split(':')[0];
              const capitalized = name.charAt(0).toUpperCase() + name.slice(1);
              return `${capitalized} ${labels.has(label) ? '✅' : '⏳'}`;
            });
            const prefix = isLowRisk && !requiresSecurity ? 'low-risk path ' : '';

            let state, description;
            if (docsRejected) {
              state = 'failure';
              description = 'Squad review gate: rejected — docs:rejected';
            } else if (missingApprovals.length === 0 && hasDocsMarker) {
              state = 'success';
              description = `Squad review gate: ${prefix}${reviewerStatusParts.join(' ')} Docs ${docsStatus}`;
            } else {
              state = 'pending';
              description = `Squad review gate: ${prefix}${reviewerStatusParts.join(' ')} Docs ${docsStatus}`;
            }

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: pr.head.sha,
              state,
              description,
              context: 'squad/review-gate'
            });

      - name: Inspect changed files for docs gate
        id: docs-changed
        uses: actions/github-script@v8
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const paths = files.map(f => f.filename);
            const labels = context.payload.pull_request.labels.map(l => l.name);

            const hasChangeset = paths.some(p => p.startsWith('.changeset/') && p.endsWith('.md') && !p.endsWith('README.md'));
            const hasDocsSite = paths.some(p => p.startsWith('docs-site/docs/'));
            const hasApiDocs = paths.some(p => p === 'docs-site/docs/extending/api-endpoints.md');
            const skipDocs = labels.includes('skip-docs');

            // User-facing signal: touches packages/*/src/ but is not test-only
            const userFacing = paths.some(p =>
              /^packages\/[^/]+\/src\//.test(p) &&
              !p.includes('__tests__') &&
              !p.endsWith('.test.ts') &&
              !p.endsWith('.test.tsx') &&
              !p.includes('/e2e/')
            );

            core.setOutput('hasChangeset', String(hasChangeset));
            core.setOutput('hasDocsSite', String(hasDocsSite));
            core.setOutput('hasApiDocs', String(hasApiDocs));
            core.setOutput('skipDocs', String(skipDocs));
            core.setOutput('userFacing', String(userFacing));

      - name: Post or update docs gate comment
        uses: actions/github-script@v8
        env:
          HAS_CHANGESET: ${{ steps.docs-changed.outputs.hasChangeset }}
          HAS_DOCS_SITE: ${{ steps.docs-changed.outputs.hasDocsSite }}
          HAS_API: ${{ steps.docs-changed.outputs.hasApiDocs }}
          SKIP_DOCS: ${{ steps.docs-changed.outputs.skipDocs }}
          USER_FACING: ${{ steps.docs-changed.outputs.userFacing }}
        with:
          script: |
            const marker = '<!-- squad-docs-gate -->';
            const userFacing = process.env.USER_FACING === 'true';
            const hasChangeset = process.env.HAS_CHANGESET === 'true';
            const hasDocsSite = process.env.HAS_DOCS_SITE === 'true';
            const skipDocs = process.env.SKIP_DOCS === 'true';
            const needsDocsGate = userFacing && !hasChangeset && !hasDocsSite && !skipDocs;

            // ✅ = done, ⚠️ = likely needed, ℹ️ = optional suggestion
            const done = v => v === 'true';
            const changesetIcon = done(process.env.HAS_CHANGESET) ? '✅'
              : userFacing ? '⚠️' : 'ℹ️';

            const docLine = (v, path, when) => done(v)
              ? `- ✅ \`${path}\` updated`
              : `- ℹ️ \`${path}\` not updated — consider updating ${when}`;

            const changesetLine = done(process.env.HAS_CHANGESET)
              ? `- ✅ changeset added (\`.changeset/*.md\`)`
              : `- ${changesetIcon} no changeset found (\`.changeset/*.md\`)`;

            const lines = [
              marker,
              '## Docs & changeset gate',
              '',
              changesetLine,
              docLine(process.env.HAS_DOCS_SITE, 'docs-site/docs/', 'if user-facing behavior or UI changed'),
              docLine(process.env.HAS_API, 'docs-site/docs/extending/api-endpoints.md', 'if the API surface changed'),
              '',
            ];

            if (skipDocs) {
              lines.push('> ℹ️ `skip-docs` label present. Docs/changeset requirement explicitly bypassed for this PR.');
            } else if (needsDocsGate) {
              lines.push('> ❌ This PR touches `packages/*/src/` but has neither a changeset nor a `docs-site/docs/` update. Add one of them or apply `skip-docs` before merging.');
            } else if (userFacing && !hasChangeset && hasDocsSite) {
              lines.push('> ✅ User-facing package changes are covered by a `docs-site/docs/` update, so a changeset is optional for this gate.');
            } else if (userFacing && !hasChangeset) {
              lines.push('> ⚠️ This PR touches `packages/*/src/` but has no changeset. If the change is user-visible, run `npm run changeset` before merging. Internal-only changes can skip this.');
            } else if (!userFacing) {
              lines.push('_No user-facing source changed. Changeset and doc updates are not needed._');
            } else {
              lines.push('_Changeset present. Good._');
            }

            lines.push('', '---', '_Hard gate for user-facing package changes without docs or changeset. ✅ = done, ⚠️ = likely needed, ℹ️ = optional or bypassed._');

            const body = lines.join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }

      - name: Enforce docs or changeset for user-facing code
        env:
          HAS_CHANGESET: ${{ steps.docs-changed.outputs.hasChangeset }}
          HAS_DOCS_SITE: ${{ steps.docs-changed.outputs.hasDocsSite }}
          SKIP_DOCS: ${{ steps.docs-changed.outputs.skipDocs }}
          USER_FACING: ${{ steps.docs-changed.outputs.userFacing }}
        run: |
          user_facing="${USER_FACING}"
          has_changeset="${HAS_CHANGESET}"
          has_docs_site="${HAS_DOCS_SITE}"
          skip_docs="${SKIP_DOCS}"

          if [[ "$skip_docs" == "true" ]]; then
            echo "Docs gate bypassed via skip-docs label."
            exit 0
          fi

          if [[ "$user_facing" == "true" && "$has_changeset" != "true" && "$has_docs_site" != "true" ]]; then
            echo "User-facing package changes require a changeset or docs-site/docs update."
            exit 1
          fi

          echo "Docs gate passed."
