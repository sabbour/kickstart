name: Squad Review Gate
on:
  pull_request:
    types: [labeled, unlabeled, opened, synchronize, reopened, edited, ready_for_review]

permissions:
  contents: read
  pull-requests: read
  statuses: write

jobs:
  check-squad-approval:
    runs-on: ubuntu-latest
    steps:
      - name: Check squad approval labels
        uses: actions/github-script@v8
        with:
          script: |
            const LOW_RISK_LABEL = 'squad:chore-auto';
            const TRUSTED_RETRO_LABEL = 'retro-log';
            const TRUSTED_RETRO_BRANCH_PREFIX = 'retro-log/pr-';
            const TRUSTED_RETRO_AUTHORS = new Set(['github-actions[bot]', 'sabbour-squad-scribe[bot]']);
            const TRUSTED_RETRO_ONLY_PATHS = new Set(['.squad/retro-log.md']);
            const SENSITIVE_PATH_PATTERNS = [
              /^\.github\/workflows\//i,
              /(^|[\/._-])(auth|guardrail|guardrails|security)([\/._-]|$)/i,
            ];

            function isSecurityPatch(pr, labels) {
              const securitySignals = [
                pr.title,
                pr.body,
                pr.head?.ref,
                ...labels,
              ].filter(Boolean).join(' ');
              return /security|cve-\d{4}-\d+|ghsa-|vuln|vulnerability/i.test(securitySignals);
            }

            function isSensitivePath(filename) {
              return SENSITIVE_PATH_PATTERNS.some((pattern) => pattern.test(filename));
            }

            function isTrustedRetroLogPr(pr, labels, changedFiles) {
              return (
                labels.has(TRUSTED_RETRO_LABEL) &&
                TRUSTED_RETRO_AUTHORS.has(pr.user?.login ?? '') &&
                (pr.head?.ref ?? '').startsWith(TRUSTED_RETRO_BRANCH_PREFIX) &&
                changedFiles.length > 0 &&
                changedFiles.every((filename) => TRUSTED_RETRO_ONLY_PATHS.has(filename))
              );
            }

            async function listChangedFiles(prNumber) {
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                per_page: 100,
              });
              return files.map((file) => file.filename);
            }

            const pr = context.payload.pull_request;
            const labels = new Set(pr.labels.map((label) => label.name));
            const changedFiles = await listChangedFiles(pr.number);
            const trustedRetroLogPr = isTrustedRetroLogPr(pr, labels, changedFiles);
            if (trustedRetroLogPr) {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: pr.head.sha,
                state: 'success',
                description: 'Squad review gate: trusted retro-log PR',
                context: 'squad/review-gate'
              });
              return;
            }
            const leelaApproved = labels.has('leela:approved');
            const zappApproved = labels.has('zapp:approved');
            const nibblerApproved = labels.has('nibbler:approved');
            const isLowRisk = labels.has(LOW_RISK_LABEL);
            const touchesSensitivePaths = changedFiles.some(isSensitivePath);
            const hasSecuritySignals = isSecurityPatch(pr, labels);

            const requiresZapp = !isLowRisk || hasSecuritySignals || touchesSensitivePaths;
            const requiredApprovals = ['leela:approved', 'nibbler:approved'];
            if (requiresZapp) {
              requiredApprovals.push('zapp:approved');
            }

            const missingApprovals = requiredApprovals.filter((label) => !labels.has(label));
            const leelaStatus = leelaApproved ? '✅' : '⏳';
            const nibblerStatus = nibblerApproved ? '✅' : '⏳';
            const zappStatus = zappApproved ? '✅' : (requiresZapp ? '⏳' : '➖');

            let state, description;
            if (missingApprovals.length === 0) {
              state = 'success';
              description = isLowRisk && !requiresZapp
                ? 'Squad review gate: Leela ✅ Nibbler ✅'
                : 'Squad review gate: Leela ✅ Nibbler ✅ Zapp ✅';
            } else {
              state = 'pending';
              description = isLowRisk && !requiresZapp
                ? `Squad review gate: Leela ${leelaStatus} Nibbler ${nibblerStatus}`
                : `Squad review gate: Leela ${leelaStatus} Nibbler ${nibblerStatus} Zapp ${zappStatus}`;
            }

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: pr.head.sha,
              state,
              description,
              context: 'squad/review-gate'
            });
