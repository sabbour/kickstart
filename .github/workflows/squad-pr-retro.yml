name: Squad · PR Retro

# On PR close, Scribe computes metrics, appends a line to .squad/retro-log.md,
# and mirrors the line as a PR comment for visibility. On pushes to main, the
# same workflow backfills reverted=true for any logged PR later reverted by a
# standard git revert commit.

on:
  pull_request:
    types: [closed]
  push:
    branches: [main]

concurrency:
  group: squad-retro-log
  cancel-in-progress: false

permissions:
  checks: read
  contents: write
  issues: write
  pull-requests: write

jobs:
  retro:
    runs-on: ubuntu-latest
    steps:
      - name: Create squad scribe app token
        id: squad_scribe_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: 3414032
          private-key: ${{ secrets.SQUAD_SCRIBE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || github.ref_name }}
          token: ${{ steps.squad_scribe_token.outputs.token }}

      - name: Classify trusted retro-log PR
        id: trusted_retro_pr
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const TRUSTED_RETRO_LABEL = 'retro-log';
            const TRUSTED_RETRO_BRANCH_PREFIX = 'retro-log/pr-';
            const TRUSTED_RETRO_AUTHORS = new Set(['github-actions[bot]', 'sabbour-squad-scribe[bot]']);
            const TRUSTED_RETRO_ONLY_PATHS = new Set(['.squad/retro-log.md']);

            const pr = context.payload.pull_request;
            const labels = new Set((pr.labels ?? []).map((label) => label.name));
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const changedFiles = files.map((file) => file.filename);
            const isTrustedRetroPr =
              labels.has(TRUSTED_RETRO_LABEL) &&
              TRUSTED_RETRO_AUTHORS.has(pr.user?.login ?? '') &&
              (pr.head?.ref ?? '').startsWith(TRUSTED_RETRO_BRANCH_PREFIX) &&
              changedFiles.length > 0 &&
              changedFiles.every((filename) => TRUSTED_RETRO_ONLY_PATHS.has(filename));

            core.setOutput('skip_pr_close', isTrustedRetroPr ? 'true' : 'false');

      - name: Resolve retro branch state
        id: retro_branch_state
        uses: actions/github-script@v8
        env:
          TARGET_BRANCH: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || github.ref_name }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const base = process.env.TARGET_BRANCH;
            const branch = `retro-log/pr-${base}`;
            const openPulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              head: `${owner}:${branch}`,
              base,
              per_page: 20,
            });

            core.setOutput('branch', branch);
            core.setOutput('has_open_pr', openPulls.length > 0 ? 'true' : 'false');

      - name: Compute metrics
        id: metrics
        if: github.event_name == 'pull_request' && steps.trusted_retro_pr.outputs.skip_pr_close != 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const title = (pr.title || '').replace(/"/g, "'");
            const author = pr.user?.login ?? 'unknown';
            const changed = (pr.additions ?? 0) + (pr.deletions ?? 0);
            const size =
              changed <= 50 ? 'S' :
              changed <= 250 ? 'M' :
              changed <= 1000 ? 'L' : 'XL';
            const isBotUser = (user) => {
              const login = user?.login ?? '';
              return user?.type === 'Bot' || /\[bot\]$/i.test(login);
            };
            const formatMinutes = (value) => Number.isFinite(value) ? `${value}m` : 'n/a';

            const linkedIssueMatch = (pr.body ?? '').match(
              /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)\b/i
            );
            const linkedIssueNumber = linkedIssueMatch
              ? Number.parseInt(linkedIssueMatch[1], 10)
              : null;
            let estimate = 'unknown';
            if (linkedIssueNumber) {
              try {
                const linkedIssue = await github.rest.issues.get({
                  owner,
                  repo,
                  issue_number: linkedIssueNumber,
                });
                const estimateLabel = (linkedIssue.data.labels ?? [])
                  .map((label) => typeof label === 'string' ? label : label.name)
                  .find((label) => /^estimate:(S|M|L|XL)$/i.test(label ?? ''));
                if (estimateLabel) {
                  estimate = estimateLabel.split(':')[1].toUpperCase();
                }
              } catch (error) {
                core.warning(`Unable to load linked issue #${linkedIssueNumber}: ${error.message}`);
              }
            }

            // Implementation window = created_at - first commit
            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const firstCommitAt = commits.length
              ? new Date(commits[0].commit.author.date)
              : new Date(pr.created_at);
            const implMin = Math.max(0, Math.round(
              (new Date(pr.created_at) - firstCommitAt) / 60000
            ));

            // Review window = merged_at (or closed_at) - ready_for_review event (fallback: created_at)
            const events = await github.paginate(github.rest.issues.listEvents, {
              owner,
              repo,
              issue_number: pr.number,
              per_page: 100,
            });
            const readyEvent = events.find(e => e.event === 'ready_for_review');
            const readyAt = readyEvent ? new Date(readyEvent.created_at) : new Date(pr.created_at);
            const closedAt = new Date(pr.merged_at ?? pr.closed_at);
            const reviewMin = Math.max(0, Math.round((closedAt - readyAt) / 60000));

            const rejections = { nibbler: 0, leela: 0, zapp: 0 };
            for (const event of events) {
              if (event.event !== 'labeled' || !event.label?.name) {
                continue;
              }
              if (event.label.name === 'nibbler:rejected') rejections.nibbler += 1;
              if (event.label.name === 'leela:rejected') rejections.leela += 1;
              if (event.label.name === 'zapp:rejected') rejections.zapp += 1;
            }

            // Review cycles = number of push-after-review events (approximation)
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const requestedChanges = reviews.filter(r => r.state === 'CHANGES_REQUESTED').length;
            const cycles = Math.max(1, requestedChanges + (pr.merged ? 0 : 0));
            const submittedReviews = reviews
              .filter((review) => review.submitted_at)
              .sort((a, b) => new Date(a.submitted_at).getTime() - new Date(b.submitted_at).getTime());
            const firstReview = submittedReviews[0];
            const firstReviewMin = firstReview?.submitted_at
              ? Math.max(0, Math.round((new Date(firstReview.submitted_at) - new Date(pr.created_at)) / 60000))
              : null;
            const reviewerType = firstReview
              ? (isBotUser(firstReview.user) ? 'bot' : 'human')
              : 'none';

            const reviewComments = await github.paginate(github.rest.pulls.listReviewComments, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const issueComments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pr.number,
              per_page: 100,
            });
            const humanCommentsCount =
              reviews.filter((review) => review.body?.trim() && !isBotUser(review.user)).length +
              reviewComments.filter((comment) => comment.body?.trim() && !isBotUser(comment.user)).length +
              issueComments.filter((comment) => comment.body?.trim() && !isBotUser(comment.user)).length;

            const checkRuns = await github.paginate(github.rest.checks.listForRef, {
              owner,
              repo,
              ref: pr.head.sha,
              per_page: 100,
            });
            const ciDurationMin = checkRuns
              .filter((run) => run.started_at && run.completed_at)
              .reduce((sum, run) => {
                const duration = new Date(run.completed_at).getTime() - new Date(run.started_at).getTime();
                return sum + Math.max(0, duration);
              }, 0);
            const ciDurationRounded = ciDurationMin > 0
              ? Math.round(ciDurationMin / 60000)
              : null;

            const outcome = pr.merged
              ? (requestedChanges > 0 ? 'merged-with-rework' : 'merged')
              : 'closed';

            const reverted = false;

            const date = closedAt.toISOString().slice(0, 10);
            const line = `- ${date} | #${pr.number} "${title}" | ${size} | impl=${implMin}m | review=${reviewMin}m | cycles=${cycles} | ${outcome} | @${author} | first_review=${formatMinutes(firstReviewMin)} | ci=${formatMinutes(ciDurationRounded)} | reviewer=${reviewerType} | human_comments=${humanCommentsCount} | issue=${linkedIssueNumber ? `#${linkedIssueNumber}` : 'none'} | estimate=${estimate} | rejections_by_reviewer=nibbler:${rejections.nibbler},leela:${rejections.leela},zapp:${rejections.zapp} | reverted=${reverted}`;

            core.setOutput('line', line);
            core.setOutput('pr', String(pr.number));

      - name: Append to retro log (as Scribe)
        if: github.event_name == 'pull_request' && steps.trusted_retro_pr.outputs.skip_pr_close != 'true'
        id: append
        env:
          LINE: ${{ steps.metrics.outputs.line }}
          SCRIBE_APP_ID: '3414032'
          TARGET_BRANCH: ${{ github.event.pull_request.base.ref }}
          RETRO_BRANCH: ${{ steps.retro_branch_state.outputs.branch }}
          HAS_OPEN_RETRO_PR: ${{ steps.retro_branch_state.outputs.has_open_pr }}
        run: |
          set -euo pipefail
          git fetch origin "$TARGET_BRANCH"
          if [ "$HAS_OPEN_RETRO_PR" = "true" ] && git ls-remote --exit-code --heads origin "$RETRO_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$RETRO_BRANCH"
            git checkout -B "$RETRO_BRANCH" "origin/$RETRO_BRANCH"
          else
            git checkout -B "$RETRO_BRANCH" "origin/$TARGET_BRANCH"
          fi
          mkdir -p .squad
          touch .squad/retro-log.md
          # Insert the new line directly after the entries marker
          awk -v line="$LINE" '
            /^<!-- entries below this line, newest at top -->$/ {
              print
              print ""
              print line
              next
            }
            { print }
          ' .squad/retro-log.md > .squad/retro-log.md.new
          mv .squad/retro-log.md.new .squad/retro-log.md

          git config user.name "sabbour-squad-scribe[bot]"
          git config user.email "${SCRIBE_APP_ID}+sabbour-squad-scribe[bot]@users.noreply.github.com"
          git add .squad/retro-log.md
          if git diff --cached --quiet; then
            echo "No retro-log changes to commit (duplicate event?)"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "branch=$RETRO_BRANCH" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(retro-log): #${{ steps.metrics.outputs.pr }} [scribe]" -m "Working as Scribe — see .squad/agents/scribe/charter.md"
          git push --force-with-lease origin "HEAD:$RETRO_BRANCH"
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "branch=$RETRO_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Upsert retro-log PR
        id: retro_pr
        if: github.event_name == 'pull_request' && steps.trusted_retro_pr.outputs.skip_pr_close != 'true' && steps.append.outputs.changed == 'true'
        uses: actions/github-script@v8
        env:
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          HEAD_BRANCH: ${{ steps.append.outputs.branch }}
        with:
          github-token: ${{ steps.squad_scribe_token.outputs.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const base = process.env.BASE_BRANCH;
            const head = process.env.HEAD_BRANCH;
            const sourcePr = context.payload.pull_request.number;
            const title = `chore(retro-log): update ${base}`;
            const body = [
              '**Working as Scribe** · see `.squad/agents/scribe/charter.md`',
              '',
              '## Retro-log update',
              `- source event: closed PR #${sourcePr}`,
              `- target branch: \`${base}\``,
              `- artifact: \`.squad/retro-log.md\``,
              '',
              'This PR exists because `main` is protected. The retro log now lands through the trusted `retro-log/pr-*` PR path instead of direct pushes.',
              '',
              '---',
              '_Generated by `.github/workflows/squad-pr-retro.yml`._',
            ].join('\n');
            const existing = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              head: `${owner}:${head}`,
              base,
              per_page: 20,
            });
            let pull = existing[0];
            if (pull) {
              pull = (await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pull.number,
                title,
                body,
                base,
              })).data;
            } else {
              pull = (await github.rest.pulls.create({
                owner,
                repo,
                title,
                head,
                base,
                body,
                draft: false,
              })).data;
            }
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: pull.number,
              labels: ['retro-log'],
            });
            core.setOutput('number', String(pull.number));
            core.setOutput('url', pull.html_url);

      - name: Detect reverted PRs
        id: reverted
        if: github.event_name == 'push'
        uses: actions/github-script@v8
        with:
          script: |
            const { execFileSync } = require('child_process');
            const fs = require('fs');
            const path = require('path');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const revertedPrs = new Set();
            const repoRoot = process.env.GITHUB_WORKSPACE || process.cwd();
            const git = (cwd, args) => execFileSync('git', args, {
              cwd,
              encoding: 'utf8',
              stdio: ['ignore', 'pipe', 'pipe'],
            }).trim();
            const getParents = (sha) => {
              const line = git(repoRoot, ['rev-list', '--parents', '-n', '1', sha]);
              const [, ...parents] = line.split(/\s+/);
              return parents;
            };
            const getTrustedRevertedSha = (commitSha, message) => {
              if (typeof commitSha !== 'string' || typeof message !== 'string') {
                return null;
              }
              const match = message.match(/^Revert "[^\n]+"\n\nThis reverts commit ([0-9a-f]{40})\.(?:\n|$)/i);
              if (!match) {
                return null;
              }
              try {
                git(repoRoot, ['cat-file', '-e', `${commitSha}^{commit}`]);
                git(repoRoot, ['cat-file', '-e', `${match[1]}^{commit}`]);
              } catch {
                return null;
              }
              const revertParents = getParents(commitSha);
              const revertedParents = getParents(match[1]);
              if (revertParents.length !== 1 || revertedParents.length < 1) {
                return null;
              }
              const scratch = path.join(repoRoot, `.revert-check-${commitSha.slice(0, 12)}`);
              try {
                if (fs.existsSync(scratch)) {
                  git(repoRoot, ['worktree', 'remove', '--force', scratch]);
                }
                git(repoRoot, ['worktree', 'add', '--detach', scratch, revertParents[0]]);
                const revertArgs = ['revert', '--no-commit'];
                if (revertedParents.length > 1) {
                  revertArgs.push('-m', '1');
                }
                revertArgs.push(match[1]);
                git(scratch, revertArgs);
                const simulatedTree = git(scratch, ['write-tree']);
                const actualTree = git(repoRoot, ['rev-parse', `${commitSha}^{tree}`]);
                return simulatedTree === actualTree ? match[1] : null;
              } catch {
                return null;
              } finally {
                if (fs.existsSync(scratch)) {
                  try {
                    git(scratch, ['revert', '--abort']);
                  } catch {}
                  try {
                    git(repoRoot, ['worktree', 'remove', '--force', scratch]);
                  } catch {}
                }
              }
            };

            for (const commit of context.payload.commits ?? []) {
              const revertedSha = getTrustedRevertedSha(commit.id ?? commit.sha, commit.message);
              if (!revertedSha) {
                continue;
              }
                const pulls = await github.paginate(github.rest.repos.listPullRequestsAssociatedWithCommit, {
                  owner,
                  repo,
                  commit_sha: revertedSha,
                  per_page: 100,
                });
                const revertedPr = pulls.find((pull) => pull.merged_at) ?? pulls[0];
                if (revertedPr) {
                  revertedPrs.add(revertedPr.number);
                }
            }

            const numbers = [...revertedPrs].sort((a, b) => a - b);
            core.info(numbers.length ? `Backfilling reverted PRs: ${numbers.join(', ')}` : 'No reverted PRs found in push payload.');
            core.setOutput('prs', JSON.stringify(numbers));

      - name: Backfill reverted flags (as Scribe)
        if: github.event_name == 'push'
        id: backfill
        env:
          SCRIBE_APP_ID: '3414032'
          PRS_JSON: ${{ steps.reverted.outputs.prs }}
          TARGET_BRANCH: ${{ github.ref_name }}
          RETRO_BRANCH: ${{ steps.retro_branch_state.outputs.branch }}
          HAS_OPEN_RETRO_PR: ${{ steps.retro_branch_state.outputs.has_open_pr }}
        run: |
          set -euo pipefail
          git fetch origin "$TARGET_BRANCH"
          if [ "$HAS_OPEN_RETRO_PR" = "true" ] && git ls-remote --exit-code --heads origin "$RETRO_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$RETRO_BRANCH"
            git checkout -B "$RETRO_BRANCH" "origin/$RETRO_BRANCH"
          else
            git checkout -B "$RETRO_BRANCH" "origin/$TARGET_BRANCH"
          fi
          node <<'EOF'
          const fs = require('fs');

          const prs = JSON.parse(process.env.PRS_JSON || '[]');
          if (!prs.length) {
            console.log('No reverted PRs to backfill.');
            process.exit(0);
          }

          const path = '.squad/retro-log.md';
          if (!fs.existsSync(path)) {
            console.log('retro-log missing; nothing to update.');
            process.exit(0);
          }

          let text = fs.readFileSync(path, 'utf8');
          let changed = false;
          for (const pr of prs) {
            const pattern = new RegExp(`(^- .*\\| #${pr} "[^\\n]*?\\| reverted=)(false)(\\s*$)`, 'm');
            if (!pattern.test(text)) {
              continue;
            }
            text = text.replace(pattern, '$1true$3');
            changed = true;
          }

          if (!changed) {
            console.log('No retro-log lines required revert updates.');
            process.exit(0);
          }

          fs.writeFileSync(path, text);
          EOF

          git config user.name "sabbour-squad-scribe[bot]"
          git config user.email "${SCRIBE_APP_ID}+sabbour-squad-scribe[bot]@users.noreply.github.com"
          git add .squad/retro-log.md
          if git diff --cached --quiet; then
            echo "No retro-log changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "branch=$RETRO_BRANCH" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(retro-log): backfill reverted flags [scribe]" -m "Working as Scribe — see .squad/agents/scribe/charter.md"
          git push --force-with-lease origin "HEAD:$RETRO_BRANCH"
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "branch=$RETRO_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Upsert retro-log backfill PR
        id: backfill_pr
        if: github.event_name == 'push' && steps.backfill.outputs.changed == 'true'
        uses: actions/github-script@v8
        env:
          BASE_BRANCH: ${{ github.ref_name }}
          HEAD_BRANCH: ${{ steps.backfill.outputs.branch }}
          PRS_JSON: ${{ steps.reverted.outputs.prs }}
        with:
          github-token: ${{ steps.squad_scribe_token.outputs.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const base = process.env.BASE_BRANCH;
            const head = process.env.HEAD_BRANCH;
            const revertedPrs = JSON.parse(process.env.PRS_JSON || '[]');
            const title = `chore(retro-log): backfill reverted flags for ${base}`;
            const body = [
              '**Working as Scribe** · see `.squad/agents/scribe/charter.md`',
              '',
              '## Retro-log revert backfill',
              `- source event: push to \`${base}\``,
              `- reverted PRs: ${revertedPrs.length ? revertedPrs.map((pr) => `#${pr}`).join(', ') : 'none'}`,
              `- artifact: \`.squad/retro-log.md\``,
              '',
              'This PR exists because `main` is protected. Revert backfills now land through the trusted `retro-log/pr-*` PR path instead of direct pushes.',
              '',
              '---',
              '_Generated by `.github/workflows/squad-pr-retro.yml`._',
            ].join('\n');
            const existing = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              head: `${owner}:${head}`,
              base,
              per_page: 20,
            });
            let pull = existing[0];
            if (pull) {
              pull = (await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pull.number,
                title,
                body,
                base,
              })).data;
            } else {
              pull = (await github.rest.pulls.create({
                owner,
                repo,
                title,
                head,
                base,
                body,
                draft: false,
              })).data;
            }
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: pull.number,
              labels: ['retro-log'],
            });
            core.setOutput('number', String(pull.number));
            core.setOutput('url', pull.html_url);

      - name: Mirror line as PR comment
        if: github.event_name == 'pull_request' && steps.trusted_retro_pr.outputs.skip_pr_close != 'true' && steps.append.outputs.changed == 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.squad_scribe_token.outputs.token }}
          script: |
            const line = `${{ steps.metrics.outputs.line }}`;
            const body = [
              '**Working as Scribe** · see `.squad/agents/scribe/charter.md`',
              '',
              '### Retro entry',
              '```',
              line,
              '```',
              '',
              `Queued via retro-log PR #${{ steps.retro_pr.outputs.number }}: ${{ steps.retro_pr.outputs.url }}`,
              'This update will land in `.squad/retro-log.md` after that PR merges.',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
